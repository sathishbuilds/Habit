<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HabitFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0d0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --surface3: #26262e;
  --border: #2e2e38;
  --accent: #7c6af7;
  --accent2: #f7a26a;
  --accent3: #6af7c8;
  --text: #f0f0f5;
  --text2: #a0a0b8;
  --text3: #606078;
  --danger: #f76a6a;
  --success: #6af7a2;
  --radius: 14px;
  --radius-sm: 8px;
}
.light {
  --bg: #f4f4f8;
  --surface: #ffffff;
  --surface2: #f0f0f6;
  --surface3: #e8e8f0;
  --border: #d8d8e8;
  --text: #12121a;
  --text2: #606078;
  --text3: #a0a0b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
h1,h2,h3,h4{font-family:'Syne',sans-serif}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:0 20px 24px;font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-0.5px}
.sidebar-logo span{color:var(--accent2)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;border-radius:0;transition:all .2s;margin:2px 8px;border-radius:var(--radius-sm)}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(124,106,247,.15),rgba(124,106,247,.05));color:var(--accent);border-left:3px solid var(--accent);margin-left:8px;padding-left:17px}
.nav-icon{font-size:16px}
.main{margin-left:240px;flex:1;padding:28px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.page-title{font-size:26px;font-weight:800}
.header-actions{display:flex;gap:10px;align-items:center}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Buttons */
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#9080ff;transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:rgba(247,106,106,.1);color:var(--danger);border:1px solid rgba(247,106,106,.2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:8px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .2s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* Forms */
.input{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}
.select{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;cursor:pointer}
.label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-group{margin-bottom:14px}
.textarea{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;min-height:80px;transition:border .2s}
.textarea:focus{border-color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto;animation:slideUp .25s}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700}

/* Progress */
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.progress-accent{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progress-green{background:var(--success)}
.progress-orange{background:var(--accent2)}

/* Stats */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-value{font-size:32px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:4px}

/* Habit */
.habit-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:8px;border:1px solid transparent;transition:all .2s}
.habit-row:hover{border-color:var(--border)}
.habit-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.habit-check.done{background:var(--accent);border-color:var(--accent)}
.habit-check.skipped{background:rgba(247,162,106,.15);border-color:var(--accent2)}
.habit-name{flex:1;font-size:14px;font-weight:500}
.habit-meta{font-size:11px;color:var(--text3)}
.streak-badge{font-size:11px;background:rgba(124,106,247,.15);color:var(--accent);padding:3px 8px;border-radius:20px;font-weight:600}

/* Heatmap */
.heatmap{display:grid;gap:3px}
.heatmap-cell{width:13px;height:13px;border-radius:3px;background:var(--surface3);transition:all .2s;cursor:pointer}
.heatmap-cell:hover{transform:scale(1.3)}
.heat-0{background:var(--surface3)}
.heat-1{background:rgba(124,106,247,.25)}
.heat-2{background:rgba(124,106,247,.5)}
.heat-3{background:rgba(124,106,247,.75)}
.heat-4{background:var(--accent)}

/* Confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.confetti-piece{position:absolute;width:10px;height:10px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.animate-pulse{animation:pulse 2s infinite}

/* Tag */
.tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-purple{background:rgba(124,106,247,.15);color:var(--accent)}
.tag-orange{background:rgba(247,162,106,.15);color:var(--accent2)}
.tag-green{background:rgba(106,247,162,.15);color:var(--success)}
.tag-red{background:rgba(247,106,106,.15);color:var(--danger)}

/* Circular progress */
.circular-progress{position:relative;display:inline-flex;align-items:center;justify-content:center}
.circular-progress svg{transform:rotate(-90deg)}
.circular-progress .value{position:absolute;font-weight:800;font-family:'Syne',sans-serif}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm);margin-bottom:20px}
.tab{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

/* Auth */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:400px;max-width:95vw}
.auth-title{font-size:28px;font-weight:800;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.auth-logo{font-size:30px;font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);margin-bottom:24px}
.auth-logo span{color:var(--accent2)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 18px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:slideUp .3s;max-width:320px}

/* Responsive */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:16px}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
}

/* Auth input override for dark bg */
.auth-card .input, .auth-card .select {
  background: var(--surface2);
}

/* Section header */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700}

.badge-on-track{background:rgba(106,247,162,.15);color:var(--success);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-behind{background:rgba(247,106,106,.15);color:var(--danger);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ahead{background:rgba(106,247,200,.15);color:var(--accent3);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}

.reading-progress{display:flex;align-items:center;gap:12px;margin:8px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── LOCAL STORAGE DB (Supabase-ready structure) ──────────────────────────────
const DB = {
  get: (key, fallback=[]) => {
    try { return JSON.parse(localStorage.getItem('hf_'+key)) ?? fallback; }
    catch { return fallback; }
  },
  set: (key, val) => localStorage.setItem('hf_'+key, JSON.stringify(val)),
  uid: () => DB.get('user', null)?.id
};

const today = () => new Date().toISOString().slice(0,10);
const formatDate = (d) => new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
const daysBetween = (a,b) => Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));
const addDays = (d,n) => { const dt=new Date(d+'T12:00:00'); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const genId = () => Math.random().toString(36).slice(2,10);

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function Confetti({ level }) {
  const colors = ['#7c6af7','#f7a26a','#6af7c8','#f76a6a','#f7f76a'];
  const count = level===1?20:level===2?40:level===3?60:100;
  const pieces = Array.from({length:count},(_,i)=>({
    id:i, color:colors[i%colors.length],
    left: Math.random()*100,
    delay: Math.random()*2,
    duration: 2+Math.random()*2,
    size: 6+Math.random()*8,
    shape: Math.random()>0.5?'circle':'square'
  }));
  return (
    <div className="confetti-container">
      {pieces.map(p=>(
        <div key={p.id} className="confetti-piece" style={{
          left:p.left+'%', backgroundColor:p.color,
          width:p.size, height:p.size,
          borderRadius:p.shape==='circle'?'50%':'2px',
          animationDelay:p.delay+'s', animationDuration:p.duration+'s',
          top: '-20px'
        }}/>
      ))}
    </div>
  );
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function Toast({ msg, onClose }) {
  useEffect(()=>{ const t=setTimeout(onClose,3000); return()=>clearTimeout(t); },[]);
  return <div className="toast">✨ {msg}</div>;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [err, setErr] = useState('');

  const submit = () => {
    setErr('');
    if(!email||!pass){setErr('Fill all fields');return;}
    const users = DB.get('users_store',[]);
    if(mode==='login'){
      const u=users.find(u=>u.email===email&&u.pass===pass);
      if(!u){setErr('Invalid credentials');return;}
      DB.set('user',u);
      onLogin(u);
    } else {
      if(!name){setErr('Enter your name');return;}
      if(users.find(u=>u.email===email)){setErr('Email already exists');return;}
      const u={id:genId(),email,name};
      DB.set('users_store',[...users,{...u,pass}]);
      DB.set('user',u);
      onLogin(u);
    }
  };

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-logo">Habit<span>Flow</span></div>
        <h2 className="auth-title">{mode==='login'?'Welcome back':'Get started'}</h2>
        <p className="auth-sub">{mode==='login'?'Track your daily habits':'Create your free account'}</p>
        {err&&<p style={{color:'var(--danger)',fontSize:13,marginBottom:12}}>⚠ {err}</p>}
        {mode==='register'&&(
          <div className="form-group">
            <label className="label">Name</label>
            <input className="input" placeholder="Your name" value={name} onChange={e=>setName(e.target.value)}/>
          </div>
        )}
        <div className="form-group">
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="form-group">
          <label className="label">Password</label>
          <input className="input" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:4}} onClick={submit}>
          {mode==='login'?'Sign In':'Create Account'}
        </button>
        <p style={{textAlign:'center',marginTop:16,fontSize:13,color:'var(--text2)'}}>
          {mode==='login'?'No account? ':'Have an account? '}
          <span style={{color:'var(--accent)',cursor:'pointer'}} onClick={()=>setMode(mode==='login'?'register':'login')}>
            {mode==='login'?'Sign up':'Sign in'}
          </span>
        </p>
        <div style={{marginTop:16,padding:12,background:'var(--surface2)',borderRadius:'var(--radius-sm)',fontSize:12,color:'var(--text3)'}}>
          💡 Demo: register any email/password to start
        </div>
      </div>
    </div>
  );
}

// ─── CIRCULAR PROGRESS ───────────────────────────────────────────────────────
function CircularProgress({ pct, size=80, stroke=6, color='var(--accent)', label }) {
  const r = (size-stroke*2)/2;
  const circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  return (
    <div className="circular-progress" style={{width:size,height:size}}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface3)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:'stroke-dashoffset .6s'}}/>
      </svg>
      <div className="value" style={{fontSize:size*0.2, color}}>
        {Math.round(pct)}%
      </div>
    </div>
  );
}

// ─── HABITS PAGE ─────────────────────────────────────────────────────────────
function HabitsPage({ uid }) {
  const [habits, setHabits] = useState(()=>DB.get('habits_'+uid,[]));
  const [logs, setLogs] = useState(()=>DB.get('hlogs_'+uid,[]));
  const [showModal, setShowModal] = useState(false);
  const [viewDate, setViewDate] = useState(today());
  const [confetti, setConfetti] = useState(null);
  const [toast, setToast] = useState('');
  const [form, setForm] = useState({name:'',category:'Health',target:'',freq:'daily'});

  const save = (h,l) => { setHabits(h); setLogs(l); DB.set('habits_'+uid,h); DB.set('hlogs_'+uid,l); };

  const addHabit = () => {
    if(!form.name.trim()) return;
    const h = [...habits, {id:genId(),name:form.name,category:form.category,target:form.target,freq:form.freq,created:today()}];
    save(h, logs);
    setForm({name:'',category:'Health',target:'',freq:'daily'});
    setShowModal(false);
  };

  const deleteHabit = (id) => {
    save(habits.filter(h=>h.id!==id), logs.filter(l=>l.hid!==id));
  };

  const toggle = (hid, status) => {
    const existing = logs.find(l=>l.hid===hid&&l.date===viewDate);
    let newLogs;
    if(existing){
      if(existing.status===status) newLogs=logs.filter(l=>!(l.hid===hid&&l.date===viewDate));
      else newLogs=logs.map(l=>l.hid===hid&&l.date===viewDate?{...l,status}:l);
    } else {
      newLogs=[...logs,{id:genId(),hid,date:viewDate,status}];
    }
    save(habits, newLogs);
    if(status==='done') {
      const streak = getStreak(hid, newLogs);
      if(streak===1) { setConfetti(1); setToast("Great start! Day 1 done! 🎉"); }
      else if(streak===3) { setConfetti(2); setToast("3-day streak! You're building momentum! 🔥"); }
      else if(streak===7) { setConfetti(3); setToast("7 days strong! One week habit locked! 💪"); }
      else if(streak>=30) { setConfetti(4); setToast(`${streak}-day streak! You're UNSTOPPABLE! 🏆`); }
      else setToast(`Habit logged for ${formatDate(viewDate)}!`);
      setTimeout(()=>setConfetti(null),3500);
    }
  };

  const getLog = (hid) => logs.find(l=>l.hid===hid&&l.date===viewDate);

  const getStreak = (hid, logArr=logs) => {
    let streak=0, d=today();
    while(true){
      const l=logArr.find(l=>l.hid===hid&&l.date===d);
      if(l&&l.status==='done') { streak++; d=addDays(d,-1); }
      else if(l&&l.status==='skipped') { d=addDays(d,-1); }
      else break;
    }
    return streak;
  };

  const getLongestStreak = (hid) => {
    const hLogs = logs.filter(l=>l.hid===hid&&l.status==='done').map(l=>l.date).sort();
    let max=0,cur=0,prev=null;
    for(const d of hLogs){
      if(prev&&daysBetween(prev,d)===1) cur++;
      else cur=1;
      max=Math.max(max,cur); prev=d;
    }
    return max;
  };

  const categories = ['Health','Fitness','Learning','Mindfulness','Productivity','Personal'];

  // Year heatmap
  const heatmapData = useMemo(()=>{
    const year = new Date().getFullYear();
    const start = `${year}-01-01`;
    const days = [];
    for(let i=0;i<365;i++){
      const d=addDays(start,i);
      const dayLogs=logs.filter(l=>l.date===d&&l.status==='done');
      const pct=habits.length?dayLogs.length/habits.length:0;
      let heat=0;
      if(pct>0)heat=1; if(pct>0.25)heat=2; if(pct>0.5)heat=3; if(pct>=1)heat=4;
      days.push({date:d,heat,count:dayLogs.length});
    }
    return days;
  },[logs,habits]);

  const weeks = [];
  for(let i=0;i<heatmapData.length;i+=7) weeks.push(heatmapData.slice(i,i+7));

  return (
    <div>
      {confetti&&<Confetti level={confetti}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="header">
        <h1 className="page-title">Daily Habits</h1>
        <div className="header-actions">
          <input type="date" className="input" style={{width:'auto'}} value={viewDate} onChange={e=>setViewDate(e.target.value)}/>
          <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Habit</button>
        </div>
      </div>

      {/* Habit list */}
      <div className="grid-2" style={{gap:20}}>
        <div>
          <div className="section-header">
            <span className="section-title">Today's Habits</span>
            <span style={{fontSize:12,color:'var(--text3)'}}>
              {logs.filter(l=>l.date===viewDate&&l.status==='done').length}/{habits.length} done
            </span>
          </div>
          {habits.length===0&&(
            <div className="empty"><div className="empty-icon">🌱</div><div className="empty-text">Add your first habit</div></div>

          {habits.map(h=>{

                <div className="progress-fill progress-accent" style={{width:Math.min(100,getStreak(h.id)/30*100)+'%'}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Heatmap */}
      <div className="card" style={{marginTop:20}}>
        <div className="section-header"><span className="section-title">📅 Year Heatmap ({new Date().getFullYear()})</span></div>
        <div style={{overflowX:'auto',paddingBottom:8}}>

              <div key={wi} style={{display:'flex',flexDirection:'column',gap:3}}>

// ─── SKILLS PAGE ──────────────────────────────────────────────────────────────
function SkillsPage({ uid }) {
  const [skills, setSkills] = useState(()=>DB.get('skills_'+uid,[]));
  const [slogs, setSlogs] = useState(()=>DB.get('slogs_'+uid,[]));
  const [showModal, setShowModal] = useState(false);
  const [logModal, setLogModal] = useState(null);
  const [effort, setEffort] = useState('');
  const [form, setForm] = useState({name:'',start:today(),target:'',dailyGoal:''});
  const [toast, setToast] = useState('');

  const saveS = (s,l) => { setSkills(s); setSlogs(l); DB.set('skills_'+uid,s); DB.set('slogs_'+uid,l); };

  const addSkill = () => {
    if(!form.name||!form.target) return;
    saveS([...skills,{id:genId(),...form}],slogs);
    setForm({name:'',start:today(),target:'',dailyGoal:''});
    setShowModal(false);
  };

  const logEffort = () => {
    if(!effort||!logModal) return;
    const existing=slogs.find(l=>l.sid===logModal.id&&l.date===today());
    let nl;
    if(existing) nl=slogs.map(l=>l.sid===logModal.id&&l.date===today()?{...l,effort:Number(effort)}:l);
    else nl=[...slogs,{id:genId(),sid:logModal.id,date:today(),effort:Number(effort)}];
    saveS(skills,nl);
    setEffort(''); setLogModal(null);
    setToast('Effort logged!');
    setTimeout(()=>setToast(''),2000);
  };

  const getSkillStats = (skill) => {
    const logs = slogs.filter(l=>l.sid===skill.id);
    const totalEffort = logs.reduce((s,l)=>s+l.effort,0);
    const daysLeft = Math.max(0,daysBetween(today(),skill.target));
    const totalDays = daysBetween(skill.start,skill.target);
    const elapsed = daysBetween(skill.start,today());
    const pct = totalDays>0?Math.min(100,Math.round((elapsed/totalDays)*100)):0;
    const dailyGoal = Number(skill.dailyGoal)||1;
    const expectedEffort = elapsed*dailyGoal;
    const status = totalEffort>=expectedEffort*0.9?'on-track':totalEffort<expectedEffort*0.7?'behind':'ahead';
    const requiredPerDay = daysLeft>0&&dailyGoal?Math.max(0,((totalDays*dailyGoal-totalEffort)/daysLeft)).toFixed(1):0;
    return {totalEffort,daysLeft,pct,status,requiredPerDay,daysCompleted:logs.length};
  };

  return (
    <div>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="header">
        <h1 className="page-title">Skill Tracker</h1>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Skill</button>
      </div>

      {skills.length===0&&<div className="empty card"><div className="empty-icon">🧠</div><div className="empty-text">Track your learning journey — add a skill</div></div>}

      <div className="grid-2">
        {skills.map(skill=>{
          const s=getSkillStats(skill);
          return (
            <div key={skill.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div>
                  <h3 style={{fontSize:16,fontWeight:700,marginBottom:4}}>{skill.name}</h3>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{formatDate(skill.start)} → {formatDate(skill.target)}</div>
                </div>
                <span className={s.status==='on-track'?'badge-on-track':s.status==='behind'?'badge-behind':'badge-ahead'}>
                  {s.status==='on-track'?'✓ On Track':s.status==='behind'?'⚠ Behind':'↑ Ahead'}
                </span>
              </div>

              <div style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:12,color:'var(--text2)'}}>Timeline Progress</span>
                  <span style={{fontSize:12,fontWeight:700}}>{s.pct}%</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill progress-accent" style={{width:s.pct+'%'}}/>
                </div>
              </div>

              <div className="grid-3" style={{gap:8,marginBottom:12}}>
                <div className="card-sm" style={{textAlign:'center',padding:10}}>
                  <div style={{fontSize:18,fontWeight:800,fontFamily:'Syne',color:'var(--accent)'}}>{s.daysCompleted}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Days Logged</div>
                </div>
                <div className="card-sm" style={{textAlign:'center',padding:10}}>
                  <div style={{fontSize:18,fontWeight:800,fontFamily:'Syne',color:'var(--accent2)'}}>{s.daysLeft}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Days Left</div>
                </div>
                <div className="card-sm" style={{textAlign:'center',padding:10}}>
                  <div style={{fontSize:18,fontWeight:800,fontFamily:'Syne',color:'var(--accent3)'}}>{s.requiredPerDay}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Needed/Day</div>
                </div>
              </div>

              {skill.dailyGoal&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:12}}>
                Daily goal: {skill.dailyGoal} units · Total effort: {s.totalEffort}
              </div>}

              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary btn-sm" onClick={()=>setLogModal(skill)}>+ Log Today</button>
                <button className="btn btn-danger btn-sm" onClick={()=>saveS(skills.filter(s=>s.id!==skill.id),slogs.filter(l=>l.sid!==skill.id))}>Delete</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add Skill Modal */}
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <h3 className="modal-title">New Skill</h3>
              <button className="btn-icon" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="form-group"><label className="label">Skill Name *</label>
              <input className="input" placeholder="e.g., React, Communication" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Start Date</label>
              <input type="date" className="input" value={form.start} onChange={e=>setForm({...form,start:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Target Date *</label>
              <input type="date" className="input" value={form.target} onChange={e=>setForm({...form,target:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Daily Effort Goal (units)</label>
              <input className="input" placeholder="e.g., 2 (hours), 30 (minutes)" value={form.dailyGoal} onChange={e=>setForm({...form,dailyGoal:e.target.value})}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addSkill}>Add Skill</button>
            </div>
          </div>
        </div>
      )}

      {/* Log Modal */}
      {logModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setLogModal(null)}>
          <div className="modal" style={{maxWidth:360}}>
            <div className="modal-header">
              <h3 className="modal-title">Log: {logModal.name}</h3>
              <button className="btn-icon" onClick={()=>setLogModal(null)}>✕</button>
            </div>
            <div className="form-group"><label className="label">Effort Today {logModal.dailyGoal&&`(Goal: ${logModal.dailyGoal})`}</label>
              <input className="input" type="number" placeholder="Units of effort" value={effort} onChange={e=>setEffort(e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setLogModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={logEffort}>Log</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BooksPage({ uid }) {
  const [books, setBooks] = useState(()=>DB.get('books_'+uid,[]));
  const [rlogs, setRlogs] = useState(()=>DB.get('rlogs_'+uid,[]));
  const [showModal, setShowModal] = useState(false);
  const [logModal, setLogModal] = useState(null);
  const [pages, setPages] = useState('');
  const [form, setForm] = useState({title:'',totalPages:'',start:today(),target:'',author:''});
  const [toast, setToast] = useState('');

  const saveB = (b,l) => { setBooks(b); setRlogs(l); DB.set('books_'+uid,b); DB.set('rlogs_'+uid,l); };

  const addBook = () => {
    if(!form.title||!form.totalPages) return;
    saveB([...books,{id:genId(),...form}],rlogs);
    setForm({title:'',totalPages:'',start:today(),target:'',author:''});
    setShowModal(false);
  };

  const logPages = () => {
    if(!pages||!logModal) return;
    const existing=rlogs.find(l=>l.bid===logModal.id&&l.date===today());
    let nl;
    if(existing) nl=rlogs.map(l=>l.bid===logModal.id&&l.date===today()?{...l,pages:Number(pages)}:l);
    else nl=[...rlogs,{id:genId(),bid:logModal.id,date:today(),pages:Number(pages)}];
    saveB(books,nl);
    setPages(''); setLogModal(null);
    setToast('Pages logged!');
    setTimeout(()=>setToast(''),2000);
  };

  const getBookStats = (book) => {
    const logs = rlogs.filter(l=>l.bid===book.id);
    const read = logs.reduce((s,l)=>s+l.pages,0);
    const total = Number(book.totalPages);
    const pct = Math.min(100,Math.round((read/total)*100));
    const remaining = Math.max(0,total-read);
    const daysLeft = book.target?Math.max(0,daysBetween(today(),book.target)):null;
    const pagesPerDay = daysLeft?Math.ceil(remaining/daysLeft):null;
    const elapsed = daysBetween(book.start,today())||1;
    const avgPerDay = Math.round(read/elapsed);
    const estDone = avgPerDay>0&&remaining>0?addDays(today(),Math.ceil(remaining/avgPerDay)):null;
    return {read,total,pct,remaining,daysLeft,pagesPerDay,avgPerDay,estDone};
  };

  return (
    <div>
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="header">
        <h1 className="page-title">📚 Book Tracker</h1>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Add Book</button>
      </div>

      {books.length===0&&<div className="empty card"><div className="empty-icon">📖</div><div className="empty-text">Add a book to start tracking your reading</div></div>}

      <div className="grid-2">
        {books.map(book=>{
          const s=getBookStats(book);
          return (
            <div key={book.id} className="card">
              <div style={{display:'flex',alignItems:'flex-start',gap:16,marginBottom:16}}>
                <div style={{width:48,height:64,borderRadius:6,background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>📖</div>
                <div style={{flex:1}}>
                  <h3 style={{fontSize:15,fontWeight:700}}>{book.title}</h3>
                  {book.author&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>by {book.author}</div>}
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Started {formatDate(book.start)}</div>
                </div>
                <span style={{fontSize:20,fontWeight:800,fontFamily:'Syne',color:s.pct===100?'var(--success)':'var(--accent)'}}>{s.pct}%</span>
              </div>

              <div className="progress-bar" style={{marginBottom:12}}>
                <div className="progress-fill" style={{width:s.pct+'%',background:s.pct===100?'var(--success)':'linear-gradient(90deg,var(--accent),var(--accent2))'}}/>
              </div>

              <div className="grid-2" style={{gap:8,marginBottom:12}}>
                <div className="card-sm" style={{padding:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--accent)'}}>{s.read} / {s.total}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Pages Read</div>
                </div>
                <div className="card-sm" style={{padding:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--accent2)'}}>{s.remaining}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Pages Left</div>
                </div>
                <div className="card-sm" style={{padding:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--accent3)'}}>{s.avgPerDay}</div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Avg/Day</div>
                </div>
                <div className="card-sm" style={{padding:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:s.pagesPerDay?'var(--danger)':'var(--text3)'}}>
                    {s.pagesPerDay||'—'}
                  </div>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Needed/Day</div>
                </div>
              </div>

              {s.estDone&&s.pct<100&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>
                📅 Est. completion: {formatDate(s.estDone)}
              </div>}
              {s.pct===100&&<div style={{fontSize:13,color:'var(--success)',fontWeight:600,marginBottom:10}}>✅ Completed!</div>}

              <div style={{display:'flex',gap:8}}>
                {s.pct<100&&<button className="btn btn-primary btn-sm" onClick={()=>setLogModal(book)}>+ Log Pages</button>}
                <button className="btn btn-danger btn-sm" onClick={()=>saveB(books.filter(b=>b.id!==book.id),rlogs.filter(l=>l.bid!==book.id))}>Delete</button>
              </div>
            </div>
          );
        })}
      </div>

      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <h3 className="modal-title">Add Book</h3>
              <button className="btn-icon" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="form-group"><label className="label">Title *</label>
              <input className="input" placeholder="Book title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Author</label>
              <input className="input" placeholder="Author name" value={form.author} onChange={e=>setForm({...form,author:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Total Pages *</label>

            <div className="grid-2" style={{gap:10}}>
              <div className="form-group"><label className="label">Start Date</label>
                <input type="date" className="input" value={form.start} onChange={e=>setForm({...form,start:e.target.value})}/>
              </div>
              <div className="form-group"><label className="label">Target Date</label>
                <input type="date" className="input" value={form.target} onChange={e=>setForm({...form,target:e.target.value})}/>
              </div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addBook}>Add Book</button>
            </div>
          </div>
        </div>
      )}

      {logModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setLogModal(null)}>
          <div className="modal" style={{maxWidth:360}}>
            <div className="modal-header">
              <h3 className="modal-title">{logModal.title}</h3>
              <button className="btn-icon" onClick={()=>setLogModal(null)}>✕</button>
            </div>
            <div className="form-group"><label className="label">Pages read today</label>
              <input className="input" type="number" placeholder="e.g., 30" value={pages} onChange={e=>setPages(e.target.value)}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setLogModal(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={logPages}>Log</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function JournalPage({ uid }) {

  const addEntry = () => {
    if(!form.topic.trim()) return;
    saveE([...entries,{id:genId(),...form,tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean)}]);
    setForm({topic:'',notes:'',tags:'',date:today()});
    setShowModal(false);
  };

  const week = entries.filter(e=>{
    const d=new Date(e.date+'T12:00:00');
    const now=new Date();
    return (now-d)/(1000*60*60*24)<=7;
  });

  const filtered = tab==='today'?entries.filter(e=>e.date===today()):
    tab==='week'?week:entries;

  const allTags = [...new Set(entries.flatMap(e=>e.tags||[]))];

  return (
    <div>

          <div className="stat-label">This Week</div>
        </div>
        <div className="stat-card" style={{flex:1}}>
          <div className="stat-value" style={{color:'var(--accent3)'}}>{allTags.length}</div>
          <div className="stat-label">Topics</div>
        </div>
      </div>

      <div className="tabs">
        {['today','week','all'].map(t=>(
          <div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
            {t==='today'?'Today':t==='week'?'This Week':'All Entries'}
          </div>
        ))}
      </div>

      {filtered.length===0&&<div className="empty card"><div className="empty-icon">✍️</div><div className="empty-text">No entries yet. Log what you learned today!</div></div>}

      {filtered.slice().reverse().map(e=>(
        <div key={e.id} className="card" style={{marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <h3 style={{fontSize:15,fontWeight:700}}>{e.topic}</h3>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:11,color:'var(--text3)'}}>{formatDate(e.date)}</span>
              <button className="btn-icon" style={{fontSize:11,color:'var(--danger)',padding:'3px 6px'}} onClick={()=>saveE(entries.filter(en=>en.id!==e.id))}>✕</button>
            </div>
          </div>
          {e.notes&&<p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:8}}>{e.notes}</p>}
          {e.tags?.length>0&&(
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {e.tags.map(t=><span key={t} className="tag tag-purple">{t}</span>)}
            </div>
          )}
        </div>
      ))}

      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <h3 className="modal-title">Log Learning</h3>
              <button className="btn-icon" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="form-group"><label className="label">Topic *</label>
              <input className="input" placeholder="What did you learn?" value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Notes</label>
              <textarea className="textarea" placeholder="Key takeaways, insights..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Tags (comma separated)</label>
              <input className="input" placeholder="React, Frontend, CSS" value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})}/>
            </div>
            <div className="form-group"><label className="label">Date</label>
              <input type="date" className="input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addEntry}>Save Entry</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardPage({ uid, user }) {
  const habits = DB.get('habits_'+uid,[]);
  const hlogs = DB.get('hlogs_'+uid,[]);
  const skills = DB.get('skills_'+uid,[]);
  const slogs = DB.get('slogs_'+uid,[]);
  const books = DB.get('books_'+uid,[]);
  const rlogs = DB.get('rlogs_'+uid,[]);
  const journals = DB.get('journal_'+uid,[]);

  const getRate = (days) => {
    if(!habits.length) return 0;
    let total=0,possible=0;
    for(let i=0;i<days;i++){
      const d=addDays(today(),-i);
      const done=hlogs.filter(l=>l.date===d&&l.status==='done').length;
      total+=done; possible+=habits.length;
    }
    return possible>0?Math.round((total/possible)*100):0;
  };

  const todayDone = hlogs.filter(l=>l.date===today()&&l.status==='done').length;
  const todayRate = habits.length?Math.round(todayDone/habits.length*100):0;

  const getStreak = (hid) => {
    let streak=0,d=today();
    while(true){
      const l=hlogs.find(l=>l.hid===hid&&l.date===d);
      if(l&&l.status==='done'){streak++;d=addDays(d,-1);}
      else if(l&&l.status==='skipped'){d=addDays(d,-1);}
      else break;
    }
    return streak;
  };

  const totalStreak = habits.reduce((s,h)=>s+getStreak(h.id),0);
  const weeklyJournal = journals.filter(e=>{
    const d=new Date(e.date+'T12:00:00');
    return (new Date()-d)/(1000*60*60*24)<=7;
  }).length;

  const activeBooks = books.filter(b=>{
    const read=rlogs.filter(l=>l.bid===b.id).reduce((s,l)=>s+l.pages,0);
    return read<Number(b.totalPages);
  });

  const greet = () => {
    const h=new Date().getHours();
    return h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  };

  return (
    <div>
      <div className="header">
        <div>
          <div style={{fontSize:13,color:'var(--text3)',marginBottom:4}}>{greet()},</div>
          <h1 className="page-title">{user.name} 👋</h1>
        </div>
        <div style={{fontSize:12,color:'var(--text3)'}}>{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
      </div>

      {/* Top stats */}
      <div className="grid-4" style={{marginBottom:20}}>
        <div className="stat-card">
          <div className="stat-value" style={{color:'var(--accent)'}}>{todayRate}%</div>
          <div className="stat-label">Today's Completion</div>
          <div className="progress-bar" style={{marginTop:8}}>
            <div className="progress-fill progress-accent" style={{width:todayRate+'%'}}/>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:'var(--accent2)'}}>{getRate(7)}%</div>
          <div className="stat-label">7-Day Rate</div>
          <div className="progress-bar" style={{marginTop:8}}>
            <div className="progress-fill progress-orange" style={{width:getRate(7)+'%'}}/>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:'var(--success)'}}>{totalStreak}</div>
          <div className="stat-label">Total Streak Days</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:'var(--accent3)'}}>{weeklyJournal}</div>
          <div className="stat-label">Learnings This Week</div>
        </div>
      </div>

      <div className="grid-2" style={{gap:20}}>
        {/* Habit progress circles */}
        <div className="card">
          <div className="section-header"><span className="section-title">Habit Progress</span></div>
          {habits.length===0&&<div className="empty"><div className="empty-text">No habits yet</div></div>}
          <div style={{display:'flex',flexWrap:'wrap',gap:16}}>
            {habits.map(h=>{
              const done=hlogs.filter(l=>l.hid===h.id&&l.status==='done').length;
              const total=hlogs.filter(l=>l.hid===h.id).length||1;
              const pct=Math.round(done/total*100);
              return (
                <div key={h.id} style={{textAlign:'center'}}>
                  <CircularProgress pct={pct} size={72} stroke={5}/>
                  <div style={{fontSize:11,color:'var(--text2)',marginTop:4,maxWidth:72,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.name}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Active skills */}
        <div className="card">
          <div className="section-header"><span className="section-title">Skills Progress</span></div>
          {skills.length===0&&<div className="empty"><div className="empty-text">No skills tracked</div></div>}
          {skills.slice(0,4).map(skill=>{
            const totalDays=daysBetween(skill.start,skill.target)||1;
            const elapsed=daysBetween(skill.start,today());
            const pct=Math.min(100,Math.round((elapsed/totalDays)*100));
            return (
              <div key={skill.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:500}}>{skill.name}</span>
                  <span style={{fontSize:12,color:'var(--accent)',fontWeight:700}}>{pct}%</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill progress-accent" style={{width:pct+'%'}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Active reading */}
        <div className="card">
          <div className="section-header"><span className="section-title">Currently Reading</span></div>
          {activeBooks.length===0&&<div className="empty"><div className="empty-text">No active books</div></div>}
          {activeBooks.slice(0,3).map(book=>{
            const read=rlogs.filter(l=>l.bid===book.id).reduce((s,l)=>s+l.pages,0);
            const pct=Math.min(100,Math.round(read/Number(book.totalPages)*100));
            return (
              <div key={book.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:13,fontWeight:500}}>{book.title}</span>
                  <span style={{fontSize:12,color:'var(--accent2)',fontWeight:700}}>{pct}%</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill progress-orange" style={{width:pct+'%'}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Monthly streak */}
        <div className="card">
          <div className="section-header"><span className="section-title">Top Habits by Streak</span></div>
          {habits.length===0&&<div className="empty"><div className="empty-text">No habits yet</div></div>}
          {habits.sort((a,b)=>getStreak(b.id)-getStreak(a.id)).slice(0,5).map(h=>(
            <div key={h.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,padding:'8px 12px',background:'var(--surface2)',borderRadius:8}}>
              <span style={{fontSize:13}}>{h.name}</span>
              <span className="streak-badge">🔥 {getStreak(h.id)} days</span>
            </div>
          ))}
        </div>
      </div>

      {/* Monthly rate chart */}
      <div className="card" style={{marginTop:20}}>
        <div className="section-header"><span className="section-title">Last 30 Days — Completion Rate</span></div>
        <div style={{display:'flex',alignItems:'flex-end',gap:3,height:80}}>
          {Array.from({length:30},(_,i)=>{
            const d=addDays(today(),i-29);
            const done=hlogs.filter(l=>l.date===d&&l.status==='done').length;
            const rate=habits.length?done/habits.length:0;
            return (
              <div key={i} title={`${formatDate(d)}: ${Math.round(rate*100)}%`}
                style={{flex:1,background:`rgba(124,106,247,${0.2+rate*0.8})`,borderRadius:'3px 3px 0 0',
                  height:Math.max(4,rate*72)+'px',transition:'height .3s',cursor:'pointer'}}/>
            );
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:11,color:'var(--text3)'}}>
          <span>30 days ago</span><span>Today</span>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(()=>DB.get('user',null));
  const [page, setPage] = useState('dashboard');
  const [dark, setDark] = useState(true);

  useEffect(()=>{
    document.body.className = dark?'':'light';
  },[dark]);

  if(!user) return <AuthPage onLogin={u=>setUser(u)}/>;

  const uid = user.id;

  const nav = [
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'habits',icon:'✅',label:'Habits'},
    {id:'skills',icon:'🧠',label:'Skills'},
    {id:'books',icon:'📚',label:'Books'},
    {id:'journal',icon:'✍️',label:'Journal'},
  ];

  const logout = () => { DB.set('user',null); setUser(null); };

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">Habit<span>Flow</span></div>
        {nav.map(n=>(
          <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span>{n.label}</span>
          </div>
        ))}
        <div style={{flex:1}}/>
        <div style={{padding:'0 8px'}}>
          <div className="nav-item" onClick={()=>setDark(!dark)}>
            <span className="nav-icon">{dark?'☀️':'🌙'}</span>
            <span>{dark?'Light Mode':'Dark Mode'}</span>
          </div>
          <div className="nav-item" style={{marginBottom:8}}>
            <span className="nav-icon">👤</span>
            <span style={{fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</span>
          </div>
          <div className="nav-item" onClick={logout} style={{color:'var(--danger)'}}>
            <span>🚪</span><span>Sign Out</span>
          </div>
        </div>
      </div>

      <div className="main">
        {page==='dashboard'&&<DashboardPage uid={uid} user={user}/>}
        {page==='habits'&&<HabitsPage uid={uid}/>}
        {page==='skills'&&<SkillsPage uid={uid}/>}
        {page==='books'&&<BooksPage uid={uid}/>}
        {page==='journal'&&<JournalPage uid={uid}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
