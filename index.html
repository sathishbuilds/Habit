}

/* ── FAB ─────────────────────────────────── */
function FAB({ onClick }){
  return (
    <button className="fab" onClick={onClick}>
      <svg viewBox="0 0 24 24" fill="none" strokeWidth="2.2" strokeLinecap="round" stroke="#fff"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  );
}

/* ── AUTH ────────────────────────────────── */
function Auth({ onLogin }){
  const [mode,setMode]=useState('login');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const go=()=>{
    setErr('');
    if(!email.trim()||!pass.trim()){setErr('Please fill in all fields');return}
    if(mode==='register'&&!name.trim()){setErr('Please enter your name');return}
    setBusy(true);
    setTimeout(()=>{
      setBusy(false);
      const users=DB.get('users',[]);
      if(mode==='login'){
        const u=users.find(u=>u.email.toLowerCase()===email.toLowerCase().trim()&&u.pass===pass);
        if(!u){setErr('No account found. Please register first, or check your password.');return}
        DB.set('sess',u); onLogin(u);
      } else {
        if(users.find(u=>u.email.toLowerCase()===email.toLowerCase().trim())){setErr('Email already registered. Please sign in.');return}
        const u={id:gid(),email:email.trim(),name:name.trim()};
        DB.set('users',[...users,{...u,pass}]); DB.set('sess',u); onLogin(u);
      }
    },350);
  };
  return (
    <div className="auth-bg">
      <div className="auth-orb1"/><div className="auth-orb2"/>
      <div className="auth-card">
        <div className="auth-wm">Zenit<span>.</span></div>
        <div className="auth-tag">{mode==='login'?'Welcome back. Your streaks are waiting.':'Build systems. Track progress. Become consistent.'}</div>
        {err&&<div className="auth-err">{err}</div>}
        {mode==='register'&&<div className="fg"><label className="lbl">Name</label><input className="inp" placeholder="e.g. Sathish" value={name} onChange={e=>setName(e.target.value)}/></div>}
        <div className="fg"><label className="lbl">Email</label><input className="inp" type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
        <div className="fg"><label className="lbl">Password</label><input className="inp" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        <button className="btn btn-v" style={{width:'100%',padding:'14px',marginTop:4}} onClick={go} disabled={busy}>{busy?'Please wait…':mode==='login'?'Sign In':'Create Account'}</button>
        <div className="auth-sw">{mode==='login'?'New here? ':'Have an account? '}<span onClick={()=>{setMode(mode==='login'?'register':'login');setErr('')}}>{mode==='login'?'Create account':'Sign in'}</span></div>
        <div className="auth-note">All data stored locally. No server required.</div>
      </div>
    </div>
  );
}

/* ── HABITS ──────────────────────────────── */
function Habits({ uid }){
  const [habits,setH]=useState(()=>DB.get('h_'+uid,[]));
  const [logs,setL]=useState(()=>DB.get('hl_'+uid,[]));
  const [sel,setSel]=useState(T());
  const [view,setView]=useState('week');
  const [addOpen,setAdd]=useState(false);
  const [detail,setDetail]=useState(null);
  const [celeb,setCeleb]=useState(null);
  const [toast,setToast]=useState('');
  const [calM,setCalM]=useState(()=>{ const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()} });
  const [editH,setEditH]=useState(null);
  const [form,setForm]=useState({name:'',cat:'Health',icon:'run',color:'#6C47FF',target:'',freq:'daily',skipWE:false,skipD:''});

  const sv=(h,l)=>{ setH(h); setL(l); DB.set('h_'+uid,h); DB.set('hl_'+uid,l) };

  const autoSkip=(h,d)=>{
    if((h.skipWE||h.freq==='weekdays')&&isWE(d)) return true;
    if(h.skipD) return h.skipD.split(',').map(s=>s.trim()).includes(d);
    return false;
  };

  const calcStreak=(hid,la=logs)=>{
    const h=habits.find(x=>x.id===hid)||{};
    let s=0,d=T();
    for(let i=0;i<730;i++){
      const l=la.find(l=>l.hid===hid&&l.date===d);
      if(l?.status==='done'){s++;d=shift(d,-1)}
      else if(l?.status==='skipped'||autoSkip(h,d)){d=shift(d,-1)}
      else break;
    }
    return s;
  };

  const calcLongest=(hid)=>{
    const done=logs.filter(l=>l.hid===hid&&l.status==='done').map(l=>l.date).sort();
    let max=0,cur=0,prev=null;
    done.forEach(d=>{ cur=prev&&diff(prev,d)===1?cur+1:1; if(cur>max)max=cur; prev=d });
    return max;
  };

  const getLog=(hid,d=sel)=>logs.find(l=>l.hid===hid&&l.date===d);

  const mark=(hid,status)=>{
    const ex=logs.find(l=>l.hid===hid&&l.date===sel);
    let nl;
    if(ex){ if(ex.status===status) nl=logs.filter(l=>!(l.hid===hid&&l.date===sel)); else nl=logs.map(l=>l.hid===hid&&l.date===sel?{...l,status}:l); }
    else nl=[...logs,{id:gid(),hid,date:sel,status}];
    sv(habits,nl);
    if(status==='done'){
      const s=calcStreak(hid,nl);
      if([1,3,7].includes(s)||s>=30) setCeleb(s);
      else setToast('Logged');
    } else if(status==='skipped') setToast('Skipped — streak intact');
    else setToast('Marked as missed');
  };

  const openAdd=(h=null)=>{
    setEditH(h);
    setForm(h?{name:h.name,cat:h.cat,icon:h.icon,color:h.color,target:h.target||'',freq:h.freq,skipWE:!!h.skipWE,skipD:h.skipD||''}:{name:'',cat:'Health',icon:'run',color:'#6C47FF',target:'',freq:'daily',skipWE:false,skipD:''});
    setAdd(true);
  };

  const saveHabit=()=>{
    if(!form.name.trim()) return;
    const h={id:editH?.id||gid(),name:form.name.trim(),cat:form.cat,icon:form.icon,color:form.color,target:form.target,freq:form.freq,skipWE:form.skipWE,skipD:form.skipD,created:editH?.created||T()};
    sv(editH?habits.map(x=>x.id===h.id?h:x):[...habits,h],logs);
    setAdd(false); setEditH(null); setToast(editH?'Updated':'Habit added');
  };

  const delHabit=id=>{ sv(habits.filter(h=>h.id!==id),logs.filter(l=>l.hid!==id)); setDetail(null) };

  // 14-day window centred on today
  const weekDays=useMemo(()=>Array.from({length:14},(_,i)=>shift(T(),i-7)),[]);

  // Month calendar cells
  const mDays=useMemo(()=>{
    const {y,m}=calM, first=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate();
    const days=[];
    for(let i=0;i<first;i++) days.push({date:shift(`${y}-${String(m+1).padStart(2,'0')}-01`,-first+i),other:true});
    for(let i=1;i<=last;i++) days.push({date:`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`,other:false});
    while(days.length<42) days.push({date:shift(days[days.length-1].date,1),other:true});
    return days;
  },[calM]);

  // Heatmap
  const hmData=useMemo(()=>{
    const y=new Date().getFullYear(), start=`${y}-01-01`;
    return Array.from({length:365},(_,i)=>{
      const d=shift(start,i);
      const done=logs.filter(l=>l.date===d&&l.status==='done').length;
      const p=habits.length?done/habits.length:0;
      return {date:d,heat:p===0?0:p<.25?1:p<.5?2:p<.75?3:4,done};
    });
  },[logs,habits]);
  const hmWks=[]; for(let i=0;i<hmData.length;i+=7) hmWks.push(hmData.slice(i,i+7));

  const todayDone=logs.filter(l=>l.date===sel&&l.status==='done').length;
  const todayPct=habits.length?Math.round(todayDone/habits.length*100):0;
  const CATS=['Health','Fitness','Learning','Mindfulness','Productivity','Personal'];
  const VCOLS=['var(--violet2)','var(--emerald)','var(--amber)','var(--rose)','var(--sky)'];

  return (
    <div className="pg">
      {celeb!==null&&<><Confetti level={celeb>=30?4:celeb>=7?3:celeb>=3?2:1}/><Celeb streak={celeb} onClose={()=>setCeleb(null)}/></>}
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}

      <div className="ph">
        <div>
          <div className="ph-title">Habits</div>
          <div className="ph-sub">{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
        </div>
        <button className="ph-btn" onClick={()=>setView(v=>v==='week'?'month':v==='month'?'year':'week')} title="Switch view">
          {Ico.cal}
        </button>
      </div>

      {/* Progress summary */}
      <div style={{padding:'2px 20px 14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
          <span style={{fontSize:11.5,color:'var(--t2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>{sel===T()?'Today':'Selected'}</span>
          <span style={{fontSize:12,fontWeight:700,fontFamily:'var(--mono)',color:'var(--violet2)'}}>{todayDone}/{habits.length}</span>
        </div>
        <div className="pbar" style={{height:5}}><div className="pf pf-v" style={{width:todayPct+'%'}}/></div>
      </div>

      {/* WEEK STRIP */}
      {view==='week'&&(
        <div className="wstrip">
          {weekDays.map(d=>{
            const isSel=d===sel, isT=d===T();
            const done=logs.filter(l=>l.date===d&&l.status==='done').length;
            const allD=done>=habits.length&&habits.length>0, part=done>0&&!allD;
            return (
              <div key={d} className="wday" onClick={()=>setSel(d)}>
                <div className="wday-lbl">{DN[dow(d)]}</div>
                <div className={`wday-pill ${isT&&!isSel?'wt':''} ${isSel?'ws':''} ${!isSel&&allD?'we':''} ${!isSel&&part?'wp':''}`}>
                  <div className="wday-num">{parseInt(d.slice(8))}</div>
                  <div className="wday-dot"/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* MONTH VIEW */}
      {view==='month'&&(
        <div className="sec">
          <div className="sec-hd">
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button className="ph-btn" style={{width:32,height:32,borderRadius:10}} onClick={()=>setCalM(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()}})}>{Ico.prev}</button>
              <span style={{fontSize:14,fontWeight:800,letterSpacing:'-.02em'}}>{MN[calM.m]} {calM.y}</span>
              <button className="ph-btn" style={{width:32,height:32,borderRadius:10}} onClick={()=>setCalM(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()}})}>{Ico.next}</button>
            </div>
            <div style={{display:'flex',gap:8,fontSize:10.5,color:'var(--t2)'}}>
              <span style={{color:'var(--emerald)'}}>● Full</span>
              <span style={{color:'var(--amber)'}}>● Part</span>
              <span style={{color:'var(--rose)'}}>● Miss</span>
            </div>
          </div>
          <div className="cal-grid">
            {DN.map(d=><div key={d} className="cal-hd">{d[0]}</div>)}
            {mDays.map(({date,other},i)=>{
              const done=habits.filter(h=>getLog(h.id,date)?.status==='done').length;
              const miss=habits.filter(h=>getLog(h.id,date)?.status==='missed').length;
              const allD=done>=habits.length&&habits.length>0, part=done>0&&!allD;
              const isSel=date===sel, isT=date===T();
              const cls=['cal-day',other?'cal-other':'',isT&&!isSel?'cal-today':'',isSel?'cal-sel':'',!isSel&&allD?'cal-full':'',!isSel&&part?'cal-part':'',!isSel&&miss>0&&done===0?'cal-miss':''].filter(Boolean).join(' ');
              return <div key={i} className={cls} onClick={()=>setSel(date)}>{parseInt(date.slice(8))}</div>;
            })}
          </div>
        </div>
      )}

      {/* YEAR HEATMAP */}
      {view==='year'&&(
        <div className="sec">
          <div className="sec-hd"><span className="sec-ttl">{new Date().getFullYear()} Consistency</span></div>
          <div className="hmap-w">
            <div className="hmap">
              {hmWks.map((col,wi)=>(
                <div key={wi} className="hmap-col">
                  {col.map((day,di)=><div key={di} className={`hmc hm${day.heat}`} title={`${day.date}: ${day.done}/${habits.length}`} onClick={()=>setSel(day.date)}/>)}
                </div>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center',marginTop:10}}>
            <span style={{fontSize:10,color:'var(--t3)'}}>Less</span>
            {[0,1,2,3,4].map(h=><div key={h} className={`hmc hm${h}`}/>)}
            <span style={{fontSize:10,color:'var(--t3)'}}>More</span>
          </div>
        </div>
      )}

      {/* Habits list */}
      <div className="sec" style={{paddingBottom:8}}>
        <div className="sec-hd">
          <span className="sec-ttl">{habits.length} Habits</span>
          <span style={{fontSize:12,color:'var(--t2)',fontFamily:'var(--mono)'}}>{fmt(sel)}</span>
        </div>
        {!habits.length&&<div className="empty"><div>{Ico.target}</div><div className="empty-t">No habits yet</div><div className="empty-s">Tap + to create your first</div></div>}
        {habits.map((h,hi)=>{
          const log=getLog(h.id), as=autoSkip(h,sel), s=calcStreak(h.id);
          const st=log?.status||(as?'skipped':null);
          const pct=Math.min(100,Math.round(s/30*100));
          return (
            <div key={h.id} className="hcard" onClick={()=>setDetail(h)}>
              {st==='done'&&<div className="hcard-accent" style={{background:h.color}}/>}
              <div className="hcard-top">
                <div className="hcard-ico" style={{background:h.color+'1A'}}>
                  <span style={{color:h.color}}>{Ico[h.icon]||Ico.target}</span>
                </div>
                <div className="hcard-body">
                  <div className={`hcard-name ${st==='done'?'dn':''}`}>{h.name}</div>
                  <div className="hcard-meta">{h.cat}{h.target&&` · ${h.target}`}{as&&!log&&<span style={{color:'var(--amber)',marginLeft:5}}>· Auto-skip</span>}</div>
                </div>
                <div className="hcard-right" onClick={e=>e.stopPropagation()}>
                  <div className={`s-tag ${s>=3?'hot':''}`}>{s}d</div>
                  <div className={`chk ${st==='done'?'ck-d':st==='skipped'?'ck-s':st==='missed'?'ck-m':''}`} onClick={()=>mark(h.id,'done')}>
                    {Ico.check}
                  </div>
                </div>
              </div>
              <div className="pbar" style={{marginTop:10}}>
                <div className="pf" style={{width:pct+'%',background:h.color}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Single FAB */}
      <FAB onClick={()=>openAdd()}/>

      {/* Detail sheet */}
      <Sheet open={!!detail} onClose={()=>setDetail(null)} title={detail?.name||''}>
        {detail&&(()=>{
          const h=detail, s=calcStreak(h.id), lo=calcLongest(h.id), done=logs.filter(l=>l.hid===h.id&&l.status==='done').length;
          const log=getLog(h.id), st=log?.status;
          return (
            <>
              <div style={{display:'flex',gap:14,alignItems:'center',marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--line)'}}>
                <div style={{width:54,height:54,borderRadius:17,background:h.color+'1A',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{color:h.color,width:24,height:24}}>{Ico[h.icon]||Ico.target}</span>
                </div>
                <div><div style={{fontSize:12,color:'var(--t2)',marginBottom:2}}>{h.cat}{h.freq==='weekdays'?' · Weekdays':h.skipWE?' · Skip weekends':''}</div>
                  {h.target&&<div style={{fontSize:13,color:'var(--t1)',fontWeight:600}}>Target: {h.target}</div>}
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9,marginBottom:20}}>
                {[[s,'Current','var(--amber)'],[lo,'Best','var(--violet2)'],[done,'Total','var(--emerald)']].map(([v,l,c])=>(
                  <div key={l} className="card-in" style={{padding:'13px 8px',textAlign:'center'}}>
                    <div style={{fontSize:22,fontWeight:800,color:c,fontFamily:'var(--mono)',letterSpacing:'-.05em'}}>{v}</div>
                    <div style={{fontSize:9.5,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.06em',fontWeight:700,marginTop:3}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:8,fontSize:11,color:'var(--t2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>Mark for {fmt(sel)}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
                {[['done',Ico.check,'Done','var(--emerald)'],['skipped',Ico.skip,'Skip','var(--amber)'],['missed',Ico.x,'Miss','var(--rose)']].map(([s2,ico,l,c])=>(
                  <button key={s2} className="btn" style={{background:st===s2?c+'22':'var(--bg3)',color:st===s2?c:'var(--t2)',border:`1.5px solid ${st===s2?c:'var(--line2)'}`,borderRadius:'var(--rm)',padding:'12px 6px',flexDirection:'column',gap:5,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.04em'}}
                    onClick={()=>mark(h.id,s2)}>
                    <span style={{width:17,height:17,display:'flex'}}>{ico}</span>{l}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>{setDetail(null);openAdd(h)}}><span style={{width:13,height:13,display:'flex'}}>{Ico.edit}</span>Edit</button>
                <button className="btn btn-danger btn-sm" style={{flex:1}} onClick={()=>delHabit(h.id)}><span style={{width:13,height:13,display:'flex'}}>{Ico.trash}</span>Delete</button>
              </div>
            </>
          );
        })()}
      </Sheet>

      {/* Add/Edit sheet */}
      <Sheet open={addOpen} onClose={()=>{setAdd(false);setEditH(null)}} title={editH?'Edit Habit':'New Habit'}
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setAdd(false);setEditH(null)}}>Cancel</button><button className="btn btn-v" style={{flex:2}} onClick={saveHabit}>{editH?'Save':'Add Habit'}</button></>}>
        <div className="fg"><label className="lbl">Name *</label><input className="inp" placeholder="e.g. Morning Run, Read 20 pages" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
        <div className="r2">
          <div className="fg"><label className="lbl">Category</label>
            <select className="sel" value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <div className="fg"><label className="lbl">Frequency</label>
            <select className="sel" value={form.freq} onChange={e=>setForm({...form,freq:e.target.value})}>
              <option value="daily">Daily</option><option value="weekdays">Weekdays</option><option value="custom">Custom</option>
            </select>
          </div>
        </div>
        <div className="fg"><label className="lbl">Icon</label>
          <div className="ipick">{HICONS.map(ic=><div key={ic} className={`ip-item ${form.icon===ic?'ip-on':''}`} onClick={()=>setForm({...form,icon:ic})}><span style={{width:17,height:17}}>{Ico[ic]}</span></div>)}</div>
        </div>
        <div className="fg"><label className="lbl">Color</label>
          <div className="cpick">{COLS.map(c=><div key={c} className={`cpick-d ${form.color===c?'cpick-on':''}`} style={{background:c}} onClick={()=>setForm({...form,color:c})}/>)}</div>
        </div>
        <div className="fg"><label className="lbl">Target (optional)</label><input className="inp" placeholder="e.g. 8 hours, 10 pages" value={form.target} onChange={e=>setForm({...form,target:e.target.value})}/></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderTop:'1px solid var(--line)'}}>
          <div><div style={{fontSize:14,fontWeight:600}}>Skip weekends</div><div style={{fontSize:11.5,color:'var(--t2)',marginTop:2}}>Auto-skip — streak stays intact</div></div>
          <Tog on={form.skipWE} set={v=>setForm({...form,skipWE:v})}/>
        </div>
        <div className="fg" style={{marginTop:13}}><label className="lbl">Custom skip dates</label><input className="inp" placeholder="2025-12-25, 2026-01-01" value={form.skipD} onChange={e=>setForm({...form,skipD:e.target.value})}/></div>
      </Sheet>
    </div>
  );
}

/* ── SKILLS ──────────────────────────────── */
function Skills({ uid }){
  const [skills,setS]=useState(()=>DB.get('s_'+uid,[]));
  const [slogs,setSL]=useState(()=>DB.get('sl_'+uid,[]));
  const [addOpen,setAdd]=useState(false);
  const [logT,setLogT]=useState(null);
  const [effort,setEff]=useState('');
  const [note,setNote]=useState('');
  const [toast,setToast]=useState('');
  const [form,setForm]=useState({name:'',start:T(),end:'',goal:'',unit:'hours',color:'#6C47FF'});
  const sv=(s,l)=>{ setS(s); setSL(l); DB.set('s_'+uid,s); DB.set('sl_'+uid,l) };

  const addSkill=()=>{
    if(!form.name.trim()||!form.end) return;
    sv([...skills,{id:gid(),...form,created:T()}],slogs);
    setForm({name:'',start:T(),end:'',goal:'',unit:'hours',color:'#6C47FF'}); setAdd(false); setToast('Skill added');
  };

  const logE=()=>{
    if(!effort||!logT) return;
    const ex=slogs.find(l=>l.sid===logT.id&&l.date===T());
    const nl=ex?slogs.map(l=>l.sid===logT.id&&l.date===T()?{...l,effort:Number(effort),note}:l):[...slogs,{id:gid(),sid:logT.id,date:T(),effort:Number(effort),note}];
    sv(skills,nl); setEff(''); setNote(''); setLogT(null); setToast('Effort logged');
  };

  const stats=(sk)=>{
    const sl=slogs.filter(l=>l.sid===sk.id);
    const tot=sl.reduce((s,l)=>s+l.effort,0);
    const td=Math.max(1,diff(sk.start,sk.end)), el=Math.max(0,diff(sk.start,T())), dl=Math.max(0,diff(T(),sk.end));
    const tPct=Math.min(100,Math.round(el/td*100));
    const dg=Number(sk.goal)||0, exp=el*dg, totalGoal=td*dg;
    const ePct=totalGoal?Math.min(100,Math.round(tot/totalGoal*100)):0;
    const status=!dg?'on-track':tot>=exp*.9?'on-track':tot<exp*.6?'behind':'ahead';
    const needed=dl&&dg?Math.max(0,(totalGoal-tot)/dl).toFixed(1):0;
    return {tot,dl,tPct,ePct,status,needed,days:sl.length,td,todayLog:sl.find(l=>l.date===T())};
  };

  return (
    <div className="pg">
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="ph"><div><div className="ph-title">Skills</div><div className="ph-sub">Learning progress tracker</div></div></div>
      <div className="sec">
        {!skills.length&&<div className="empty"><div>{Ico.brain}</div><div className="empty-t">No skills tracked</div><div className="empty-s">Add a skill to monitor your growth</div></div>}
        {skills.map((sk,i)=>{
          const s=stats(sk), c=sk.color||COLS[i%COLS.length];
          return (
            <div key={sk.id} className="tcard">
              <div className="tcard-hd">
                <div><div className="tcard-name">{sk.name}</div><div className="tcard-meta">{fmt(sk.start)} → {fmt(sk.end)}{sk.goal&&` · ${sk.goal} ${sk.unit}/day`}</div></div>
                <span className={`chip ${s.status==='on-track'?'ce':s.status==='behind'?'cr':'cs'}`}>{s.status==='on-track'?'On Track':s.status==='behind'?'Behind':'Ahead'}</span>
              </div>
              <div style={{marginBottom:11}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style={{fontSize:10,color:'var(--t2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>Timeline</span><span style={{fontSize:11,fontWeight:700,fontFamily:'var(--mono)',color:c}}>{s.tPct}%</span></div>
                <div className="pbar" style={{height:5}}><div className="pf" style={{width:s.tPct+'%',background:c}}/></div>
              </div>
              {sk.goal&&<div style={{marginBottom:13}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style={{fontSize:10,color:'var(--t2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>Effort ({sk.unit})</span><span style={{fontSize:11,fontWeight:700,fontFamily:'var(--mono)',color:'var(--amber)'}}>{s.tot} / {Number(sk.goal)*s.td}</span></div>
                <div className="pbar" style={{height:5}}><div className="pf pf-a" style={{width:s.ePct+'%'}}/></div>
              </div>}
              <div className="tcard-stats">
                {[[s.days,'Logged',c],[s.dl,'Days Left','var(--amber)'],[s.needed||'✓','Needed/d',s.needed>0?'var(--rose)':'var(--emerald)']].map(([v,l,col])=>(
                  <div key={l} className="tstat"><div className="tstat-v" style={{color:col}}>{v}</div><div className="tstat-l">{l}</div></div>
                ))}
              </div>
              {s.todayLog&&<div style={{fontSize:12,color:'var(--emerald)',marginBottom:11,fontWeight:600}}>Today: {s.todayLog.effort} {sk.unit}</div>}
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-v btn-sm" style={{flex:1}} onClick={()=>setLogT(sk)}>Log Today</button>
                <button className="btn btn-danger btn-xs" onClick={()=>sv(skills.filter(x=>x.id!==sk.id),slogs.filter(l=>l.sid!==sk.id))}><span style={{width:13,height:13,display:'flex'}}>{Ico.trash}</span></button>
              </div>
            </div>
          );
        })}
      </div>
      <FAB onClick={()=>setAdd(true)}/>
      <Sheet open={addOpen} onClose={()=>setAdd(false)} title="New Skill"
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setAdd(false)}>Cancel</button><button className="btn btn-v" style={{flex:2}} onClick={addSkill}>Add Skill</button></>}>
        <div className="fg"><label className="lbl">Skill Name *</label><input className="inp" placeholder="React, SAP, Communication…" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
        <div className="r2">
          <div className="fg"><label className="lbl">Start</label><input type="date" className="inp" value={form.start} onChange={e=>setForm({...form,start:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Target *</label><input type="date" className="inp" value={form.end} onChange={e=>setForm({...form,end:e.target.value})}/></div>
        </div>
        <div className="r2">
          <div className="fg"><label className="lbl">Daily Goal</label><input type="number" className="inp" placeholder="2" value={form.goal} onChange={e=>setForm({...form,goal:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Unit</label>
            <select className="sel" value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})}>{['hours','minutes','sessions','modules','exercises','chapters'].map(u=><option key={u}>{u}</option>)}</select>
          </div>
        </div>
        <div className="fg"><label className="lbl">Color</label><div className="cpick">{COLS.map(c=><div key={c} className={`cpick-d ${form.color===c?'cpick-on':''}`} style={{background:c}} onClick={()=>setForm({...form,color:c})}/>)}</div></div>
      </Sheet>
      <Sheet open={!!logT} onClose={()=>setLogT(null)} title={'Log: '+(logT?.name||'')}
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setLogT(null)}>Cancel</button><button className="btn btn-v" style={{flex:2}} onClick={logE}>Log Effort</button></>}>
        <div className="fg"><label className="lbl">Effort ({logT?.unit}) {logT?.goal&&`— Goal: ${logT.goal}`}</label><input className="inp" type="number" placeholder="e.g. 2" value={effort} onChange={e=>setEff(e.target.value)}/></div>
        <div className="fg"><label className="lbl">Notes (optional)</label><textarea className="ta" placeholder="What did you work on?" value={note} onChange={e=>setNote(e.target.value)}/></div>
      </Sheet>
    </div>
  );
}

/* ── BOOKS ───────────────────────────────── */
function Books({ uid }){
  const [books,setB]=useState(()=>DB.get('b_'+uid,[]));
  const [rlogs,setRL]=useState(()=>DB.get('rl_'+uid,[]));
  const [addOpen,setAdd]=useState(false);
  const [logT,setLogT]=useState(null);
  const [pages,setPg]=useState('');
  const [note,setNote]=useState('');
  const [toast,setToast]=useState('');
  const [filter,setFilter]=useState('all');
  const [form,setForm]=useState({title:'',author:'',genre:'',total:'',start:T(),end:''});
  const sv=(b,l)=>{ setB(b); setRL(l); DB.set('b_'+uid,b); DB.set('rl_'+uid,l) };

  const addBook=()=>{
    if(!form.title.trim()||!form.total) return;
    sv([...books,{id:gid(),...form}],rlogs);
    setForm({title:'',author:'',genre:'',total:'',start:T(),end:''}); setAdd(false); setToast('Book added');
  };

  const logPages=()=>{
    if(!pages||!logT) return;
    const ex=rlogs.find(l=>l.bid===logT.id&&l.date===T());
    const nl=ex?rlogs.map(l=>l.bid===logT.id&&l.date===T()?{...l,pages:Number(pages),note}:l):[...rlogs,{id:gid(),bid:logT.id,date:T(),pages:Number(pages),note}];
    sv(books,nl); setPg(''); setNote(''); setLogT(null); setToast('Pages logged');
  };

  const bStats=(book)=>{
    const bl=rlogs.filter(l=>l.bid===book.id);
    const read=bl.reduce((s,l)=>s+l.pages,0);
    const total=Number(book.total), pct=Math.min(100,Math.round(read/total*100));
    const rem=Math.max(0,total-read);
    const dl=book.end?Math.max(0,diff(T(),book.end)):null;
    const needed=dl&&rem?Math.ceil(rem/dl):null;
    const el=Math.max(1,diff(book.start,T()));
    const avg=Math.round(read/el)||0;
    const estDate=avg&&rem?fmtL(shift(T(),Math.ceil(rem/avg))):null;
    let rs=0; for(let i=0;i<365;i++){ if(bl.find(l=>l.date===shift(T(),-i))) rs++; else break; }
    return {read,total,pct,rem,dl,needed,avg,estDate,rs,todayLog:bl.find(l=>l.date===T())};
  };

  const shown=filter==='all'?books:filter==='done'?books.filter(b=>bStats(b).pct>=100):books.filter(b=>bStats(b).pct<100);
  const GRD=['linear-gradient(135deg,#160C38,#2A1060)','linear-gradient(135deg,#0C2A1A,#0C3A2A)','linear-gradient(135deg,#2A1A0C,#3A2A0C)','linear-gradient(135deg,#2A0C1A,#3A0C2A)','linear-gradient(135deg,#0C1A2A,#0C2A3A)','linear-gradient(135deg,#1A1A0C,#2A2A0C)'];

  return (
    <div className="pg">
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="ph"><div><div className="ph-title">Books</div><div className="ph-sub">Reading tracker</div></div></div>
      <div className="stat-grid">
        <div className="scard"><div className="sval" style={{color:'var(--violet2)'}}>{rlogs.reduce((s,l)=>s+l.pages,0)}</div><div className="slbl">Pages Read</div></div>
        <div className="scard"><div className="sval" style={{color:'var(--emerald)'}}>{books.filter(b=>bStats(b).pct>=100).length}</div><div className="slbl">Completed</div></div>
      </div>
      <div className="tabs">
        {[['all','All'],['reading','Reading'],['done','Finished']].map(([v,l])=>(
          <button key={v} className={`tbtn ${filter===v?'on':''}`} onClick={()=>setFilter(v)}>{l}</button>
        ))}
      </div>
      <div className="sec">
        {!shown.length&&<div className="empty"><div>{Ico.book}</div><div className="empty-t">No books here</div><div className="empty-s">Tap + to add a book</div></div>}
        {shown.map((book,bi)=>{
          const s=bStats(book);
          return (
            <div key={book.id} className="tcard">
              <div style={{display:'flex',gap:13,marginBottom:13,alignItems:'flex-start'}}>
                <div style={{width:46,height:62,borderRadius:10,background:GRD[bi%GRD.length],display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid rgba(255,255,255,.07)'}}>
                  <span style={{color:'rgba(255,255,255,.55)',width:20,height:20}}>{Ico.book}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:800,letterSpacing:'-.03em',marginBottom:2,lineHeight:1.3}}>{book.title}</div>
                  {book.author&&<div style={{fontSize:12,color:'var(--t2)'}}>by {book.author}</div>}
                  {book.genre&&<span className="chip cg" style={{marginTop:5,display:'inline-flex',fontSize:10,padding:'3px 9px'}}>{book.genre}</span>}
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:22,fontWeight:800,fontFamily:'var(--mono)',letterSpacing:'-.05em',color:s.pct>=100?'var(--emerald)':'var(--violet2)'}}>{s.pct}%</div>
                  {s.rs>0&&<span className="chip ca" style={{marginTop:4,display:'inline-flex',fontSize:10,padding:'2px 8px'}}>{s.rs}d</span>}
                </div>
              </div>
              <div className="pbar" style={{height:5,marginBottom:13}}>
                <div className="pf" style={{width:s.pct+'%',background:s.pct>=100?'var(--emerald)':'linear-gradient(90deg,var(--violet),var(--violet2))'}}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginBottom:13}}>
                {[[s.read+'/'+s.total,'Read'],[s.rem>0?s.rem:'Done','Left'],[s.avg+'/d','Avg'],[s.needed?s.needed+'/d':s.pct>=100?'✓':s.estDate||'—',s.needed?'Needed':'Est. End']].map(([v,l],i)=>(
                  <div key={i} className="tstat" style={{padding:'8px 4px'}}>
                    <div className="tstat-v" style={{fontSize:11,color:'var(--t1)'}}>{v}</div>
                    <div className="tstat-l" style={{fontSize:8.5}}>{l}</div>
                  </div>
                ))}
              </div>
              {s.todayLog&&<div style={{fontSize:12,color:'var(--emerald)',marginBottom:10,fontWeight:600}}>Today: {s.todayLog.pages} pages</div>}
              {s.pct>=100&&<div style={{fontSize:13,color:'var(--emerald)',fontWeight:700,marginBottom:10}}>Completed</div>}
              <div style={{display:'flex',gap:8}}>
                {s.pct<100&&<button className="btn btn-v btn-sm" style={{flex:1}} onClick={()=>setLogT(book)}>Log Pages</button>}
                <button className="btn btn-danger btn-xs" onClick={()=>sv(books.filter(b=>b.id!==book.id),rlogs.filter(l=>l.bid!==book.id))}><span style={{width:13,height:13,display:'flex'}}>{Ico.trash}</span></button>
              </div>
            </div>
          );
        })}
      </div>
      <FAB onClick={()=>setAdd(true)}/>
      <Sheet open={addOpen} onClose={()=>setAdd(false)} title="Add Book"
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setAdd(false)}>Cancel</button><button className="btn btn-v" style={{flex:2}} onClick={addBook}>Add Book</button></>}>
        <div className="fg"><label className="lbl">Title *</label><input className="inp" placeholder="Book title" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div>
        <div className="r2">
          <div className="fg"><label className="lbl">Author</label><input className="inp" placeholder="Author" value={form.author} onChange={e=>setForm({...form,author:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Genre</label><input className="inp" placeholder="Fiction…" value={form.genre} onChange={e=>setForm({...form,genre:e.target.value})}/></div>
        </div>
        <div className="fg"><label className="lbl">Total Pages *</label><input type="number" className="inp" placeholder="300" value={form.total} onChange={e=>setForm({...form,total:e.target.value})}/></div>
        <div className="r2">
          <div className="fg"><label className="lbl">Start</label><input type="date" className="inp" value={form.start} onChange={e=>setForm({...form,start:e.target.value})}/></div>
          <div className="fg"><label className="lbl">Target</label><input type="date" className="inp" value={form.end} onChange={e=>setForm({...form,end:e.target.value})}/></div>
        </div>
      </Sheet>
      <Sheet open={!!logT} onClose={()=>setLogT(null)} title={logT?.title||''}
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setLogT(null)}>Cancel</button><button className="btn btn-v" style={{flex:2}} onClick={logPages}>Log Pages</button></>}>
        <div className="fg"><label className="lbl">Pages read today</label><input type="number" className="inp" placeholder="e.g. 30" value={pages} onChange={e=>setPg(e.target.value)}/></div>
        <div className="fg"><label className="lbl">Notes / Highlights</label><textarea className="ta" placeholder="Key quotes, insights…" value={note} onChange={e=>setNote(e.target.value)}/></div>
      </Sheet>
    </div>
  );
}

/* ── JOURNAL ─────────────────────────────── */
function Journal({ uid }){
  const [entries,setE]=useState(()=>DB.get('j_'+uid,[]));
  const [tab,setTab]=useState('today');
  const [addOpen,setAdd]=useState(false);
  const [editEnt,setEdit]=useState(null);
  const [search,setSrch]=useState('');
  const [aTag,setATag]=useState('');
  const [toast,setToast]=useState('');
  const [form,setForm]=useState({topic:'',notes:'',tags:'',date:T()});
  const sv=e=>{ setE(e); DB.set('j_'+uid,e) };

  const openAdd=(e=null)=>{
    setEdit(e);
    setForm(e?{topic:e.topic,notes:e.notes||'',tags:(e.tags||[]).join(', '),date:e.date}:{topic:'',notes:'',tags:'',date:T()});
    setAdd(true);
  };

  const saveE=()=>{
    if(!form.topic.trim()) return;
    const entry={id:editEnt?.id||gid(),...form,tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean)};
    sv(editEnt?entries.map(e=>e.id===editEnt.id?entry:e):[...entries,entry]);
    setAdd(false); setEdit(null); setToast('Saved');
  };

  const now=new Date();
  const weekE=entries.filter(e=>(now-new Date(e.date+'T12:00'))/86400000<=7);
  const monthE=entries.filter(e=>{ const d=new Date(e.date+'T12:00'); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear() });
  const allTags=[...new Set(entries.flatMap(e=>e.tags||[]))];

  const mSum=useMemo(()=>{
    const bt={};
    monthE.forEach(e=>(e.tags||[]).forEach(t=>{ bt[t]=(bt[t]||0)+1 }));
    return {count:monthE.length,top:Object.entries(bt).sort((a,b)=>b[1]-a[1]).slice(0,6)};
  },[monthE]);

  const shown=(tab==='today'?entries.filter(e=>e.date===T()):tab==='week'?weekE:tab==='month'?monthE:entries)
    .filter(e=>{ if(aTag&&!(e.tags||[]).includes(aTag)) return false; if(!search) return true; return (e.topic+' '+(e.notes||'')+' '+(e.tags||[]).join(' ')).toLowerCase().includes(search.toLowerCase()) })
    .slice().reverse();

  return (
    <div className="pg">
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="ph"><div><div className="ph-title">Journal</div><div className="ph-sub">Learning log & recall</div></div></div>
      <div className="stat-grid">
        <div className="scard"><div className="sval" style={{color:'var(--violet2)'}}>{entries.length}</div><div className="slbl">Entries</div></div>
        <div className="scard"><div className="sval" style={{color:'var(--sky)'}}>{allTags.length}</div><div className="slbl">Topics</div></div>
      </div>
      <div className="tabs">
        {[['today','Today'],['week','Week'],['month','Month'],['all','All']].map(([v,l])=>(
          <button key={v} className={`tbtn ${tab===v?'on':''}`} onClick={()=>setTab(v)}>{l}</button>
        ))}
      </div>
      {tab==='month'&&mSum.count>0&&(
        <div className="sec" style={{paddingBottom:8}}>
          <div className="card-glow" style={{padding:16}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Month Summary</div>
            <div style={{fontSize:20,fontWeight:800,letterSpacing:'-.04em',marginBottom:8,fontFamily:'var(--mono)'}}>{mSum.count} <span style={{fontSize:13,color:'var(--t2)',fontFamily:'inherit',letterSpacing:'normal',fontWeight:600}}>entries</span></div>
            {mSum.top.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5}}>{mSum.top.map(([t,n])=><span key={t} className="chip cv" style={{cursor:'pointer',fontSize:10.5}} onClick={()=>setATag(t)}>{t} ({n})</span>)}</div>}
          </div>
        </div>
      )}
      <div className="srch-w">
        <div className="srch-ico">{Ico.search}</div>
        <input className="srch-inp" placeholder="Search entries, topics, tags…" value={search} onChange={e=>setSrch(e.target.value)}/>
      </div>
      {allTags.length>0&&<div style={{padding:'0 20px 13px',display:'flex',gap:5,flexWrap:'wrap'}}>
        {allTags.slice(0,8).map(t=><span key={t} className={`chip ${aTag===t?'cv':'cg'}`} style={{cursor:'pointer'}} onClick={()=>setATag(aTag===t?'':t)}>{t}</span>)}
      </div>}
      <div className="sec">
        {!shown.length&&<div className="empty"><div>{Ico.pen}</div><div className="empty-t">No entries found</div><div className="empty-s">Tap + to log what you learned</div></div>}
        {shown.map(e=>(
          <div key={e.id} className="jcard">
            <div className="jcard-top">
              <div className="jcard-title" onClick={()=>openAdd(e)}>{e.topic}</div>
              <div style={{display:'flex',gap:7,alignItems:'center',flexShrink:0}}>
                <div className="jcard-date">{fmt(e.date)}</div>
                <button style={{width:27,height:27,borderRadius:8,background:'var(--roseDim)',border:'1px solid rgba(255,77,106,.2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--rose)'}} onClick={ev=>{ev.stopPropagation();sv(entries.filter(en=>en.id!==e.id))}}>
                  <span style={{width:12,height:12}}>{Ico.trash}</span>
                </button>
              </div>
            </div>
            {e.notes&&<div className="jcard-notes">{e.notes}</div>}
            {e.tags?.length>0&&<div style={{display:'flex',gap:5,flexWrap:'wrap'}}>{e.tags.map(t=><span key={t} className="chip cv" style={{fontSize:10.5,cursor:'pointer',padding:'3px 9px'}} onClick={()=>setATag(t)}>{t}</span>)}</div>}
          </div>
        ))}
      </div>
      <FAB onClick={()=>openAdd()}/>
      <Sheet open={addOpen} onClose={()=>{setAdd(false);setEdit(null)}} title={editEnt?'Edit Entry':'Log Learning'}
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setAdd(false);setEdit(null)}}>Cancel</button><button className="btn btn-v" style={{flex:2}} onClick={saveE}>{editEnt?'Save':'Add Entry'}</button></>}>
        <div className="fg"><label className="lbl">What did you learn? *</label><input className="inp" placeholder="Topic or skill" value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Notes & Key Takeaways</label><textarea className="ta" style={{minHeight:110}} placeholder="Insights, examples, what surprised you…" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Tags (comma separated)</label><input className="inp" placeholder="React, SAP, Communication" value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})}/></div>
        <div className="fg"><label className="lbl">Date</label><input type="date" className="inp" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
      </Sheet>
    </div>
  );
}

/* ── DASHBOARD ───────────────────────────── */
function Dashboard({ uid, user, onNav }){
  const habits=DB.get('h_'+uid,[]);
  const hlogs=DB.get('hl_'+uid,[]);
  const skills=DB.get('s_'+uid,[]);
  const books=DB.get('b_'+uid,[]);
  const rlogs=DB.get('rl_'+uid,[]);
  const journals=DB.get('j_'+uid,[]);

  const calcStreak=(hid)=>{
    const h=habits.find(x=>x.id===hid)||{};
    const as=d=>(h.skipWE&&isWE(d))||(h.freq==='weekdays'&&isWE(d));
    let s=0,d=T();
    for(let i=0;i<730;i++){
      const l=hlogs.find(l=>l.hid===hid&&l.date===d);
      if(l?.status==='done'){s++;d=shift(d,-1)}
      else if(l?.status==='skipped'||as(d)){d=shift(d,-1)}
      else break;
    }
    return s;
  };

  const rate=(days)=>{
    if(!habits.length) return 0;
    let dn=0,pos=0;
    for(let i=0;i<days;i++){ const d=shift(T(),-i); dn+=hlogs.filter(l=>l.date===d&&l.status==='done').length; pos+=habits.length }
    return pos?Math.round(dn/pos*100):0;
  };

  const monthRate=()=>{
    const n=new Date(),y=n.getFullYear(),m=n.getMonth(),pd=n.getDate();
    if(!habits.length) return 0;
    let dn=0,pos=0;
    for(let i=1;i<=pd;i++){ const d=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; dn+=hlogs.filter(l=>l.date===d&&l.status==='done').length; pos+=habits.length }
    return pos?Math.round(dn/pos*100):0;
  };

  const todayDone=hlogs.filter(l=>l.date===T()&&l.status==='done').length;
  const todayPct=habits.length?Math.round(todayDone/habits.length*100):0;
  const totalStreaks=habits.reduce((s,h)=>s+calcStreak(h.id),0);
  const totalPages=rlogs.reduce((s,l)=>s+l.pages,0);
  const activeBooks=books.filter(b=>rlogs.filter(l=>l.bid===b.id).reduce((s,l)=>s+l.pages,0)<Number(b.total));
  const barD=Array.from({length:28},(_,i)=>{ const d=shift(T(),i-27); const dn=hlogs.filter(l=>l.date===d&&l.status==='done').length; return {d,p:habits.length?dn/habits.length:0} });
  const greet=()=>{ const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening' };
  const VCOLS=['var(--violet2)','var(--emerald)','var(--amber)','var(--rose)','var(--sky)'];

  return (
    <div className="pg">
      {/* Greeting banner */}
      <div style={{padding:'18px 20px 0'}}>
        <div className="gbanner">
          <div className="gorb" style={{width:180,height:180,background:'radial-gradient(circle,rgba(108,71,255,.35),transparent)',top:-60,right:-50}}/>
          <div className="gorb" style={{width:120,height:120,background:'radial-gradient(circle,rgba(0,200,150,.2),transparent)',bottom:-30,left:'35%'}}/>
          <div className="g-date">{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
          <div className="g-name">{greet()}, {user.name.split(' ')[0]}</div>
          <div className="g-stats">
            {[[todayPct+'%','Today'],[rate(7)+'%','7-Day'],[monthRate()+'%','Month'],[totalStreaks,'Streaks']].map(([v,l])=>(
              <div key={l} className="gst"><div className="gst-v">{v}</div><div className="gst-l">{l}</div></div>
            ))}
          </div>
        </div>
      </div>

      {/* Quick nav tiles */}
      <div style={{padding:'16px 20px 20px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
        {[['Habits','h',Ico.run,'var(--violet)'],['Skills','s',Ico.brain,'var(--emerald)'],['Books','b',Ico.book,'var(--amber)'],['Journal','j',Ico.pen,'var(--rose)']].map(([l,p,ico,c])=>(
          <div key={p} onClick={()=>onNav(p)} style={{background:'var(--bg2)',border:'1px solid var(--line)',borderRadius:'var(--rm)',padding:'14px 6px',textAlign:'center',cursor:'pointer',transition:'all .2s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=c}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--line)'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:5,color:c}}><span style={{width:19,height:19}}>{ico}</span></div>
            <div style={{fontSize:10,fontWeight:700,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.04em'}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Today habit circles */}
      {habits.length>0&&(
        <div className="sec">
          <div className="sec-hd"><span className="sec-ttl">Today's Progress</span><span className="sec-act" onClick={()=>onNav('h')}>See all</span></div>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',paddingBottom:4}}>
            {habits.slice(0,5).map((h,i)=>{
              const done=hlogs.filter(l=>l.hid===h.id&&l.status==='done').length;
              const total=Math.max(1,diff(h.created,T())+1);
              const pct=Math.round(done/total*100);
              const isDone=hlogs.find(l=>l.hid===h.id&&l.date===T())?.status==='done';
              return (
                <div key={h.id} style={{textAlign:'center',cursor:'pointer'}} onClick={()=>onNav('h')}>
                  <CircProg pct={pct} size={60} stroke={5} color={isDone?'var(--emerald)':(h.color||VCOLS[i%VCOLS.length])}/>
                  <div style={{fontSize:10,color:'var(--t2)',marginTop:5,maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}}>{h.name}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Per-habit completion bars */}
      {habits.length>0&&(
        <div className="sec">
          <div className="sec-hd"><span className="sec-ttl">Completion Rates</span></div>
          <div className="card" style={{padding:17}}>
            {habits.map((h,i)=>{
              const done=hlogs.filter(l=>l.hid===h.id&&l.status==='done').length;
              const total=Math.max(1,diff(h.created,T())+1);
              const pct=Math.round(done/total*100);
              const c=h.color||VCOLS[i%VCOLS.length];
              return (
                <div key={h.id} style={{marginBottom:i<habits.length-1?13:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:26,height:26,borderRadius:8,background:c+'1A',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{color:c,width:13,height:13}}>{Ico[h.icon]||Ico.target}</span></div>
                      <span style={{fontSize:13,fontWeight:700}}>{h.name}</span>
                    </div>
                    <div style={{display:'flex',gap:7,alignItems:'center'}}>
                      <span className="chip ca" style={{fontSize:10,padding:'2px 8px'}}>{calcStreak(h.id)}d</span>
                      <span style={{fontSize:12,fontWeight:800,fontFamily:'var(--mono)',color:c}}>{pct}%</span>
                    </div>
                  </div>
                  <div className="pbar" style={{height:4}}><div className="pf" style={{width:pct+'%',background:c}}/></div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 28-day chart */}
      <div className="sec">
        <div className="sec-hd"><span className="sec-ttl">28-Day Overview</span></div>
        <div className="card" style={{padding:17}}>
          <div style={{display:'flex',alignItems:'flex-end',gap:3,height:72}}>
            {barD.map(({d,p},i)=>{
              const isT=d===T();
              return <div key={i} title={`${fmt(d)}: ${Math.round(p*100)}%`} style={{flex:1,borderRadius:'3px 3px 0 0',background:isT?'var(--violet)':`rgba(108,71,255,${.09+p*.82})`,height:Math.max(3,p*68)+'px',transition:'height .4s',cursor:'pointer',boxShadow:isT?'0 0 10px var(--violetGlow)':'none'}}/>;
            })}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:7,fontSize:10,color:'var(--t3)',fontFamily:'var(--mono)'}}>
            <span>{fmt(shift(T(),-27))}</span><span style={{color:'var(--violet2)',fontWeight:700}}>Today</span>
          </div>
        </div>
      </div>

      {/* Skills + books progress */}
      {(skills.length>0||activeBooks.length>0)&&(
        <div className="sec">
          <div className="sec-hd"><span className="sec-ttl">Skills & Reading</span></div>
          <div className="card" style={{padding:17}}>
            {skills.map(sk=>{
              const td=Math.max(1,diff(sk.start,sk.end)), el=Math.max(0,diff(sk.start,T()));
              const pct=Math.min(100,Math.round(el/td*100));
              return (
                <div key={sk.id} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{width:13,height:13,color:'var(--violet2)'}}>{Ico.brain}</span><span style={{fontSize:13,fontWeight:700}}>{sk.name}</span></div>
                    <span style={{fontSize:11,fontWeight:800,fontFamily:'var(--mono)',color:'var(--violet2)'}}>{pct}%</span>
                  </div>
                  <div className="pbar" style={{height:4}}><div className="pf pf-v" style={{width:pct+'%'}}/></div>
                </div>
              );
            })}
            {activeBooks.map((book)=>{
              const read=rlogs.filter(l=>l.bid===book.id).reduce((s,l)=>s+l.pages,0);
              const pct=Math.min(100,Math.round(read/Number(book.total)*100));
              return (
                <div key={book.id} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{width:13,height:13,color:'var(--amber)'}}>{Ico.book}</span><span style={{fontSize:13,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:180}}>{book.title}</span></div>
                    <span style={{fontSize:11,fontWeight:800,fontFamily:'var(--mono)',color:'var(--amber)'}}>{pct}%</span>
                  </div>
                  <div className="pbar" style={{height:4}}><div className="pf pf-a" style={{width:pct+'%'}}/></div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Streak leaderboard */}
      {habits.length>0&&(
        <div className="sec">
          <div className="sec-hd"><span className="sec-ttl">Streak Rankings</span></div>
          {[...habits].sort((a,b)=>calcStreak(b.id)-calcStreak(a.id)).slice(0,5).map((h,i)=>{
            const s=calcStreak(h.id), c=h.color||VCOLS[i%VCOLS.length];
            return (
              <div key={h.id} style={{display:'flex',alignItems:'center',gap:11,padding:'11px 15px',background:'var(--bg2)',borderRadius:'var(--rm)',marginBottom:8,border:'1px solid var(--line)'}}>
                <div style={{width:24,textAlign:'center',fontSize:14,fontWeight:800,fontFamily:'var(--mono)',color:i===0?'var(--amber)':i===1?'var(--t2)':i===2?'var(--amber)':'var(--t3)',opacity:i===0?1:i===1?.7:i===2?.5:.35}}>{i+1}</div>
                <div style={{width:34,height:34,borderRadius:11,background:c+'1A',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{color:c,width:17,height:17}}>{Ico[h.icon]||Ico.target}</span></div>
                <div style={{flex:1,fontSize:13,fontWeight:700}}>{h.name}</div>
                <span className="chip ca" style={{fontFamily:'var(--mono)',fontSize:11}}>{s}d</span>
              </div>
            );
          })}
        </div>
      )}
      <div style={{height:8}}/>
    </div>
  );
}

/* ── SETTINGS ────────────────────────────── */
function Settings({ user, dark, setDark, onLogout }){
  return (
    <div className="pg">
      <div className="ph"><div><div className="ph-title">Settings</div><div className="ph-sub">Preferences & account</div></div></div>
      <div className="sec">
        <div className="card" style={{padding:'0 17px'}}>
          <div className="srow"><div><div className="srow-l">Account</div><div className="srow-sub">{user.name} · {user.email}</div></div></div>
          <div className="srow">
            <div><div className="srow-l">{dark?'Dark Mode':'Light Mode'}</div><div className="srow-sub">Switch appearance</div></div>
            <Tog on={dark} set={setDark}/>
          </div>
          <div className="srow"><div><div className="srow-l">Version</div><div className="srow-sub">Zenit v4.0 · Data stored locally</div></div></div>
        </div>
        <div style={{marginTop:20}}>
          <button className="btn btn-danger" style={{width:'100%',padding:'13px',fontSize:14,justifyContent:'center'}} onClick={onLogout}>Sign Out</button>
        </div>
        <div style={{marginTop:14,padding:'12px 14px',background:'var(--bg2)',borderRadius:'var(--rm)',fontSize:12,color:'var(--t3)',lineHeight:1.65,border:'1px solid var(--line)'}}>
          Connect Supabase for cross-device sync using the included schema. All current data is safe in your browser's localStorage.
        </div>
      </div>
    </div>
  );
}

/* ── ROOT ────────────────────────────────── */
function App(){
  const [user,setUser]=useState(()=>DB.get('sess',null));
  const [page,setPage]=useState('home');
  const [dark,setDark]=useState(()=>DB.get('theme','dark')==='dark');
  useEffect(()=>{ document.body.className=dark?'':'light'; DB.set('theme',dark?'dark':'light') },[dark]);
  if(!user) return <Auth onLogin={u=>setUser(u)}/>;
  const uid=user.id;
  const NAV=[{id:'home',ico:Ico.home,lbl:'Home'},{id:'h',ico:Ico.run,lbl:'Habits'},{id:'s',ico:Ico.brain,lbl:'Skills'},{id:'b',ico:Ico.book,lbl:'Books'},{id:'j',ico:Ico.pen,lbl:'Journal'},{id:'cfg',ico:Ico.settings,lbl:'More'}];
  return (
    <div className="shell">
      <div className="scroll-area">
        {page==='home'&&<Dashboard uid={uid} user={user} onNav={setPage}/>}
        {page==='h'&&<Habits uid={uid}/>}
        {page==='s'&&<Skills uid={uid}/>}
        {page==='b'&&<Books uid={uid}/>}
        {page==='j'&&<Journal uid={uid}/>}
        {page==='cfg'&&<Settings user={user} dark={dark} setDark={setDark} onLogout={()=>{DB.set('sess',null);setUser(null)}}/>}
      </div>
      <div className="nav-float">
        {NAV.map(n=>(
          <button key={n.id} className={`nb ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
            <span style={{width:19,height:19,display:'flex',alignItems:'center',justifyContent:'center'}}>{n.ico}</span>
            <span className="nl">{n.lbl}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
