      <Sheet open={!!logTarget} onClose={()=>setLogTarget(null)} title={'📖 '+( logTarget?.title||'')}
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setLogTarget(null)}>Cancel</button>
          <button className="btn btn-primary" style={{flex:2}} onClick={logRead}>Log Pages</button></>}>
        <div className="fg"><label className="form-label">Pages Read Today</label><input type="number" className="input" placeholder="e.g. 30" value={pages} onChange={e=>setPages(e.target.value)}/></div>
        <div className="fg"><label className="form-label">Notes / Highlights</label><textarea className="textarea" placeholder="Key quotes, thoughts, insights…" value={logNote} onChange={e=>setLogNote(e.target.value)}/></div>
      </Sheet>
    </div>
  );
}

/* ─── JOURNAL PAGE ────────────────────────────────────────── */
function JournalPage({ uid }){
  const [entries,setEntries]=useState(()=>DB.get('journal_'+uid,[]));
  const [tab,setTab]=useState('today');
  const [addOpen,setAddOpen]=useState(false);
  const [editEntry,setEditEntry]=useState(null);
  const [search,setSearch]=useState('');
  const [activeTag,setActiveTag]=useState('');
  const [form,setForm]=useState({topic:'',notes:'',tags:'',date:todayStr()});
  const [toast,setToast]=useState('');

  const saveE=e=>{ setEntries(e); DB.set('journal_'+uid,e) };

  const openAdd=(e=null)=>{
    if(e){ setEditEntry(e); setForm({topic:e.topic,notes:e.notes||'',tags:(e.tags||[]).join(', '),date:e.date}) }
    else { setEditEntry(null); setForm({topic:'',notes:'',tags:'',date:todayStr()}) }
    setAddOpen(true);
  };

  const saveEntry=()=>{
    if(!form.topic.trim()) return;
    const entry={id:editEntry?.id||genId(),...form,tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean)};
    saveE(editEntry?entries.map(e=>e.id===editEntry.id?entry:e):[...entries,entry]);
    setAddOpen(false); setEditEntry(null); setToast('✍️ Entry saved!');
  };

  const now=NOW();
  const weekE=entries.filter(e=>(now-new Date(e.date+'T12:00'))/86400000<=7);
  const monthE=entries.filter(e=>{ const d=new Date(e.date+'T12:00'); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear() });
  const allTags=[...new Set(entries.flatMap(e=>e.tags||[]))];

  const monthlySummary=useMemo(()=>{
    const bt={};
    monthE.forEach(e=>(e.tags||[]).forEach(t=>{ bt[t]=(bt[t]||0)+1 }));
    return {count:monthE.length,topTags:Object.entries(bt).sort((a,b)=>b[1]-a[1]).slice(0,6)};
  },[monthE]);

  const shown=(tab==='today'?entries.filter(e=>e.date===todayStr()):tab==='week'?weekE:tab==='month'?monthE:entries)
    .filter(e=>{
      if(activeTag&&!(e.tags||[]).includes(activeTag)) return false;
      if(!search) return true;
      return (e.topic+' '+(e.notes||'')+' '+(e.tags||[]).join(' ')).toLowerCase().includes(search.toLowerCase());
    }).slice().reverse();

  return (
    <div className="slide-in">
      {toast&&<Toast msg={toast} onClose={()=>setToast('')}/>}
      <div className="page-header">
        <div className="page-title">Journal ✍️</div>
        <div className="header-action" onClick={()=>openAdd()}>＋</div>
      </div>

      <div className="stat-row">
        <div className="stat-box"><div className="stat-val" style={{color:'var(--accent)'}}>{entries.length}</div><div className="stat-lbl">Total Entries</div></div>
        <div className="stat-box"><div className="stat-val" style={{color:'var(--teal)'}}>{allTags.length}</div><div className="stat-lbl">Topics</div></div>
      </div>

      <div className="tabs-row">
        {[['today','Today'],['week','Week'],['month','Month'],['all','All']].map(([v,l])=>(
          <button key={v} className={`tab-btn ${tab===v?'active':''}`} onClick={()=>setTab(v)}>{l}</button>
        ))}
      </div>

      {/* Monthly Summary */}
      {tab==='month'&&monthlySummary.count>0&&(
        <div className="section" style={{marginBottom:0}}>
          <div className="card" style={{padding:16,marginBottom:14,borderLeft:'3px solid var(--teal)'}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>📊 {MONTH_NAMES[now.getMonth()]} Summary</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}><strong style={{color:'var(--teal)'}}>{monthlySummary.count}</strong> entries logged this month</div>
            {monthlySummary.topTags.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {monthlySummary.topTags.map(([t,n])=><span key={t} className="tag-pill">{t} ({n})</span>)}
            </div>}
          </div>
        </div>
      )}

      <div className="search-wrap">
        <input className="search-input" placeholder="Search entries, topics, tags…" value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {allTags.length>0&&(
        <div style={{padding:'0 20px',marginBottom:14,display:'flex',gap:6,flexWrap:'wrap'}}>
          {allTags.slice(0,8).map(t=>(
            <span key={t} className={`chip ${activeTag===t?'on':''}`} onClick={()=>setActiveTag(activeTag===t?'':t)}>{t}</span>
          ))}
        </div>
      )}

      <div className="section">
        {shown.length===0&&<div className="empty"><div className="empty-ico">✍️</div><div className="empty-msg">No entries found.<br/>Log what you learned today!</div></div>}
        {shown.map(e=>(
          <div key={e.id} className="card" style={{marginBottom:12,padding:16}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,alignItems:'flex-start'}}>
              <div style={{fontSize:14,fontWeight:700,flex:1,paddingRight:8,lineHeight:1.3,cursor:'pointer'}} onClick={()=>openAdd(e)}>{e.topic}</div>
              <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                <div style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap'}}>{fmt(e.date)}</div>
                <div style={{width:26,height:26,borderRadius:8,background:'rgba(240,96,96,.1)',border:'1px solid rgba(240,96,96,.15)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:12,color:'var(--danger)'}}
                  onClick={ev=>{ev.stopPropagation();saveE(entries.filter(en=>en.id!==e.id))}}>🗑</div>
              </div>
            </div>
            {e.notes&&<div style={{fontSize:12.5,color:'var(--text2)',lineHeight:1.6,marginBottom:8,whiteSpace:'pre-wrap',display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{e.notes}</div>}
            {e.tags?.length>0&&<div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {e.tags.map(t=><span key={t} className="tag-pill" onClick={ev=>{ev.stopPropagation();setActiveTag(t)}}>{t}</span>)}
            </div>}
          </div>
        ))}
      </div>

      <button className="btn-fab" onClick={()=>openAdd()}>＋</button>

      <Sheet open={addOpen} onClose={()=>{setAddOpen(false);setEditEntry(null)}} title={editEntry?'Edit Entry':'Log Learning'}
        footer={<><button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setAddOpen(false);setEditEntry(null)}}>Cancel</button>
          <button className="btn btn-primary" style={{flex:2}} onClick={saveEntry}>{editEntry?'Save Changes':'Save Entry'}</button></>}>
        <div className="fg"><label className="form-label">What did you learn? *</label>
          <input className="input" placeholder="Topic or skill title" value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})}/>
        </div>
        <div className="fg"><label className="form-label">Notes & Key Takeaways</label>
          <textarea className="textarea" style={{minHeight:110}} placeholder="What did you understand? Key insights, examples, questions…" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
        </div>
        <div className="fg"><label className="form-label">Tags (comma separated)</label>
          <input className="input" placeholder="React, JavaScript, SAP, Communication" value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})}/>
        </div>
        <div className="fg"><label className="form-label">Date</label>
          <input type="date" className="input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
        </div>
      </Sheet>
    </div>
  );
}

/* ─── DASHBOARD ──────────────────────────────────────────── */
function DashboardPage({ uid, user, onNav }){
  const habits=DB.get('habits_'+uid,[]);
  const hlogs=DB.get('hlogs_'+uid,[]);
  const skills=DB.get('skills_'+uid,[]);
  const slogs=DB.get('slogs_'+uid,[]);
  const books=DB.get('books_'+uid,[]);
  const rlogs=DB.get('rlogs_'+uid,[]);
  const journals=DB.get('journal_'+uid,[]);

  const calcStreak=(hid)=>{
    const h=habits.find(x=>x.id===hid)||{};
    const isAutoSkip=d=>(h.skipWeekends&&isWeekend(d))||(h.freq==='weekdays'&&isWeekend(d));
    let s=0,d=todayStr();
    for(let i=0;i<730;i++){
      const l=hlogs.find(l=>l.hid===hid&&l.date===d);
      if(l?.status==='done'){s++;d=addDays(d,-1)}
      else if(l?.status==='skipped'||isAutoSkip(d)){d=addDays(d,-1)}
      else break;
    }
    return s;
  };

  const getRate=(days)=>{
    if(!habits.length) return 0;
    let done=0,pos=0;
    for(let i=0;i<days;i++){ const d=addDays(todayStr(),-i); done+=hlogs.filter(l=>l.date===d&&l.status==='done').length; pos+=habits.length }
    return pos?Math.round(done/pos*100):0;
  };

  const getMonthRate=()=>{
    const n=NOW(); const y=n.getFullYear(); const m=n.getMonth(); const pd=n.getDate();
    if(!habits.length) return 0;
    let done=0,pos=0;
    for(let i=1;i<=pd;i++){ const d=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; done+=hlogs.filter(l=>l.date===d&&l.status==='done').length; pos+=habits.length }
    return pos?Math.round(done/pos*100):0;
  };

  const todayDone=hlogs.filter(l=>l.date===todayStr()&&l.status==='done').length;
  const todayPct=habits.length?Math.round(todayDone/habits.length*100):0;
  const weekPct=getRate(7);
  const monthPct=getMonthRate();
  const totalStreaks=habits.reduce((s,h)=>s+calcStreak(h.id),0);
  const weekJ=journals.filter(e=>(NOW()-new Date(e.date+'T12:00'))/86400000<=7).length;
  const totalPages=rlogs.reduce((s,l)=>s+l.pages,0);
  const activeBooks=books.filter(b=>rlogs.filter(l=>l.bid===b.id).reduce((s,l)=>s+l.pages,0)<Number(b.totalPages));

  const greet=()=>{ const h=NOW().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening' };

  const barData=Array.from({length:28},(_,i)=>{
    const d=addDays(todayStr(),i-27);
    const done=hlogs.filter(l=>l.date===d&&l.status==='done').length;
    return {d,pct:habits.length?done/habits.length:0};
  });

  const COLORS=['var(--accent)','var(--orange)','var(--teal)','var(--pink)','var(--green)','#F0C060','#60A0F0'];

  return (
    <div className="slide-in">
      {/* Greeting Card */}
      <div style={{padding:'16px 20px 0'}}>
        <div className="greeting-card">
          <div className="gcb"/><div className="gcb2"/>
          <div className="greeting-date">{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>
          <div className="greeting-name">{greet()}, {user.name.split(' ')[0]}! 👋</div>
          <div className="greeting-stats">
            {[[todayPct+'%','Today'],[weekPct+'%','7-Day'],[monthPct+'%','Month'],[totalStreaks,'Streaks']].map(([v,l])=>(
              <div key={l} className="greeting-stat"><div className="greeting-stat-val">{v}</div><div className="greeting-stat-lbl">{l}</div></div>
            ))}
          </div>
        </div>
      </div>

      {/* Quick actions */}
      <div style={{padding:'16px 20px',display:'flex',gap:10}}>
        {[['✅','Habits','habits'],['🧠','Skills','skills'],['📚','Books','books'],['✍️','Journal','journal']].map(([ico,lbl,pg])=>(
          <div key={pg} onClick={()=>onNav(pg)} style={{flex:1,background:'var(--card)',borderRadius:'12px',padding:'12px 8px',textAlign:'center',cursor:'pointer',border:'1px solid var(--border)',transition:'all .2s'}}>
            <div style={{fontSize:20,marginBottom:4}}>{ico}</div>
            <div style={{fontSize:10,color:'var(--text2)',fontWeight:700}}>{lbl}</div>
          </div>
        ))}
      </div>

      {/* Today's habits */}
      {habits.length>0&&(
        <div className="section">
          <div className="sec-hd">
            <span className="sec-title">Today's Habits</span>
            <span className="sec-link" onClick={()=>onNav('habits')}>See all</span>
          </div>
          <div style={{display:'flex',gap:12,justifyContent:'space-around',padding:'12px 0'}}>
            {habits.slice(0,5).map((h,i)=>{
              const done=hlogs.find(l=>l.hid===h.id&&l.date===todayStr())?.status==='done';
              const streak=calcStreak(h.id);
              const pct=Math.min(100,Math.round(hlogs.filter(l=>l.hid===h.id&&l.status==='done').length/Math.max(1,daysBetween(h.created,todayStr())+1)*100));
              return (
                <div key={h.id} style={{textAlign:'center',cursor:'pointer'}} onClick={()=>onNav('habits')}>
                  <CircProg pct={pct} size={60} stroke={5} color={done?'var(--green)':COLORS[i%COLORS.length]}/>
                  <div style={{fontSize:10,color:'var(--text2)',marginTop:4,maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.name}</div>
                  <div style={{fontSize:10,color:'var(--orange)',fontWeight:700}}>🔥{streak}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Habits completion per habit bar */}
      {habits.length>0&&(
        <div className="section">
          <div className="sec-hd"><span className="sec-title">Habit Completion Rates</span></div>
          <div className="card" style={{padding:16}}>
            {habits.map((h,i)=>{
              const done=hlogs.filter(l=>l.hid===h.id&&l.status==='done').length;
              const total=Math.max(1,daysBetween(h.created,todayStr())+1);
              const pct=Math.round(done/total*100);
              return (
                <div key={h.id} style={{marginBottom:i<habits.length-1?14:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:16}}>{h.icon||'✅'}</span>
                      <span style={{fontSize:13,fontWeight:600}}>{h.name}</span>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <span className="badge b-accent">🔥{calcStreak(h.id)}</span>
                      <span style={{fontSize:12,fontWeight:800,color:COLORS[i%COLORS.length]}}>{pct}%</span>
                    </div>
                  </div>
                  <div className="pill-bar">
                    <div className="pill-fill" style={{width:pct+'%',background:COLORS[i%COLORS.length]}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 28-day chart */}
      <div className="section">
        <div className="sec-hd"><span className="sec-title">28-Day Completion</span></div>
        <div className="card" style={{padding:16}}>
          <div style={{display:'flex',alignItems:'flex-end',gap:3,height:80}}>
            {barData.map(({d,pct},i)=>{
              const isT=d===todayStr();
              return (
                <div key={i} title={`${fmt(d)}: ${Math.round(pct*100)}%`} style={{
                  flex:1,borderRadius:'4px 4px 0 0',
                  background:isT?'var(--accent)':`rgba(124,106,245,${.12+pct*.8})`,
                  height:Math.max(3,pct*76)+'px',transition:'height .4s',cursor:'pointer',
                  boxShadow:isT?'0 0 8px var(--accentglow)':''
                }}/>
              );
            })}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:'var(--text3)'}}>
            <span>28 days ago</span><span style={{color:'var(--accent)',fontWeight:700}}>Today</span>
          </div>
        </div>
      </div>

      {/* Active reading + skills */}
      <div className="section">
        <div className="sec-hd"><span className="sec-title">Skills & Reading</span></div>
        <div className="card" style={{padding:16}}>
          {skills.map(skill=>{
            const td=Math.max(1,daysBetween(skill.start,skill.target));
            const el=Math.max(0,daysBetween(skill.start,todayStr()));
            const pct=Math.min(100,Math.round(el/td*100));
            return (
              <div key={skill.id} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><span>🧠</span><span style={{fontSize:13,fontWeight:600}}>{skill.name}</span></div>
                  <span style={{fontSize:12,fontWeight:800,color:'var(--accent)'}}>{pct}%</span>
                </div>
                <div className="pill-bar"><div className="pill-fill fill-accent" style={{width:pct+'%'}}/></div>
              </div>
            );
          })}
          {activeBooks.map((book,bi)=>{
            const read=rlogs.filter(l=>l.bid===book.id).reduce((s,l)=>s+l.pages,0);
            const pct=Math.min(100,Math.round(read/Number(book.totalPages)*100));
            return (
              <div key={book.id} style={{marginBottom:bi<activeBooks.length-1?12:0}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><span>📖</span><span style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:180}}>{book.title}</span></div>
                  <span style={{fontSize:12,fontWeight:800,color:'var(--orange)'}}>{pct}%</span>
                </div>
                <div className="pill-bar"><div className="pill-fill fill-orange" style={{width:pct+'%'}}/></div>
              </div>
            );
          })}
          {!skills.length&&!activeBooks.length&&<div style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:'8px 0'}}>No skills or books tracked yet</div>}
        </div>
      </div>

      {/* Streak leaderboard */}
      {habits.length>0&&(
        <div className="section">
          <div className="sec-hd"><span className="sec-title">🏆 Streak Board</span></div>
          {[...habits].sort((a,b)=>calcStreak(b.id)-calcStreak(a.id)).slice(0,5).map((h,i)=>{
            const s=calcStreak(h.id);
            const m=['🥇','🥈','🥉','4️⃣','5️⃣'];
            return (
              <div key={h.id} className="habit-item" style={{marginBottom:8}}>
                <div style={{fontSize:20,width:28,textAlign:'center'}}>{m[i]}</div>
                <div className="habit-icon-bg" style={{background:(h.color||'#7C6AF5')+'22',width:36,height:36}}>
                  <span style={{fontSize:17}}>{h.icon||'✅'}</span>
                </div>
                <div className="habit-info"><div className="habit-name">{h.name}</div></div>
                <div className="habit-streak" style={{fontSize:14}}>🔥 {s} days</div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{height:16}}/>
    </div>
  );
}

/* ─── SETTINGS PAGE ──────────────────────────────────────── */
function SettingsPage({ uid, user, dark, setDark, onLogout }){
  return (
    <div className="slide-in">
      <div className="page-header"><div className="page-title">Settings ⚙️</div></div>
      <div className="section">
        <div className="card" style={{padding:'0 16px'}}>
          <div className="settings-row">
            <div><div className="settings-lbl">👤 Account</div><div className="settings-sub">{user.name} · {user.email}</div></div>
          </div>
          <div className="settings-row">
            <div><div className="settings-lbl">{dark?'🌙 Dark Mode':'☀️ Light Mode'}</div><div className="settings-sub">Switch app appearance</div></div>
            <button className={`theme-pill ${dark?'dark':'light'}`} onClick={()=>setDark(d=>!d)}>
              <div className="theme-knob">{dark?'🌙':'☀️'}</div>
            </button>
          </div>
          <div className="settings-row">
            <div><div className="settings-lbl">📱 App</div><div className="settings-sub">HabitFlow v3.0 · All data stored locally</div></div>
          </div>
        </div>
        <div style={{marginTop:20}}>
          <button className="btn btn-danger" style={{width:'100%',padding:14}} onClick={onLogout}>🚪 Sign Out</button>
        </div>
        <div style={{marginTop:16,padding:14,background:'var(--card)',borderRadius:12,fontSize:12,color:'var(--text3)',lineHeight:1.6,border:'1px solid var(--border)'}}>
          💡 <strong style={{color:'var(--text2)'}}>Supabase Integration:</strong> This app uses localStorage. To sync across devices, connect Supabase using the schema in supabase_schema.sql.
        </div>
      </div>
    </div>
  );
}

/* ─── ROOT APP ───────────────────────────────────────────── */
function App(){
  const [user,setUser]=useState(()=>DB.get('session',null));
  const [page,setPage]=useState('home');
  const [dark,setDark]=useState(()=>DB.get('theme','dark')==='dark');

  useEffect(()=>{ document.body.className=dark?'':'light'; DB.set('theme',dark?'dark':'light') },[dark]);

  const logout=()=>{ DB.set('session',null); setUser(null) };
  if(!user) return <AuthPage onLogin={u=>setUser(u)}/>;

  const uid=user.id;
  const NAV=[
    {id:'home',ico:'🏠',lbl:'Home'},
    {id:'habits',ico:'✅',lbl:'Habits'},
    {id:'skills',ico:'🧠',lbl:'Skills'},
    {id:'books',ico:'📚',lbl:'Books'},
    {id:'journal',ico:'✍️',lbl:'Journal'},
  ];

  return (
    <div className="shell">
      <div className="content">
        {page==='home'&&<DashboardPage uid={uid} user={user} onNav={setPage}/>}
        {page==='habits'&&<HabitsPage uid={uid}/>}
        {page==='skills'&&<SkillsPage uid={uid}/>}
        {page==='books'&&<BooksPage uid={uid}/>}
        {page==='journal'&&<JournalPage uid={uid}/>}
        {page==='settings'&&<SettingsPage uid={uid} user={user} dark={dark} setDark={setDark} onLogout={logout}/>}
      </div>

      <div className="bottom-nav">
        {NAV.map(n=>(
          <button key={n.id} className={`nav-btn ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
            <span className="nav-ico">{n.ico}</span>
            <span className="nav-lbl">{n.lbl}</span>
            <div className="nav-dot"/>
          </button>
        ))}
        <button className={`nav-btn ${page==='settings'?'active':''}`} onClick={()=>setPage('settings')}>
          <span className="nav-ico">⚙️</span>
          <span className="nav-lbl">Settings</span>
          <div className="nav-dot"/>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
